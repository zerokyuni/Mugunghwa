
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>모바일 퍼니스피드: 무궁화 (최종)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            touch-action: none;
            overflow: hidden;
            background-color: #4ade80; /* 잔디 배경 */
        }
        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        .step-btn:active, .step-btn.active {
            transform: scale(0.95);
            background-color: #fbbf24;
        }
    </style>
</head>
<body class="w-screen h-screen flex flex-col relative select-none font-sans">

    <!-- 게임 정보 헤더 -->
    <div class="absolute top-0 left-0 w-full p-4 flex justify-between items-start z-10 pointer-events-none">
        <div class="flex flex-col gap-2">
            <div class="bg-gray-900 bg-opacity-80 text-white px-4 py-2 rounded-full font-bold shadow-md text-sm md:text-base">
                STAGE <span id="stageText" class="text-yellow-400">1</span>
            </div>
            <div class="bg-gray-900 bg-opacity-80 text-white px-4 py-2 rounded-full font-bold shadow-md text-sm md:text-base">
                누적 점수: <span id="scoreText" class="text-green-400">0</span>m
            </div>
        </div>
        <div class="bg-blue-600 text-white px-4 py-2 rounded-full font-bold shadow-md text-sm md:text-base">
            남은 거리: <span id="distText">20</span>m
        </div>
    </div>

    <!-- 캔버스 -->
    <canvas id="gameCanvas" class="flex-grow"></canvas>

    <!-- 하단 조작 컨트롤 -->
    <div id="controls" class="h-32 bg-gray-800 flex justify-between items-center p-4 gap-4 z-10 w-full shrink-0 shadow-[0_-4px_10px_rgba(0,0,0,0.3)]">
        <button id="btnLeft" class="step-btn flex-1 h-full bg-yellow-400 rounded-2xl text-2xl font-black text-gray-900 shadow-[0_8px_0_#b45309] transition-transform flex items-center justify-center">
            왼발 👣
        </button>
        <button id="btnRight" class="step-btn flex-1 h-full bg-yellow-400 rounded-2xl text-2xl font-black text-gray-900 shadow-[0_8px_0_#b45309] transition-transform flex items-center justify-center">
            오른발 👣
        </button>
    </div>

    <!-- UI 오버레이 -->
    <div id="uiOverlay" class="absolute inset-0 bg-black bg-opacity-80 flex flex-col items-center justify-center z-20 transition-opacity">
        <h1 id="uiTitle" class="text-5xl md:text-7xl font-black text-white mb-2 text-center drop-shadow-lg">무궁화 꽃이<br>피었습니다</h1>
        <p id="uiDesc" class="text-white text-lg md:text-xl mb-8 text-center px-6 leading-relaxed">
            <span class="text-yellow-300">왼발, 오른발을 번갈아 터치</span>하여 전진하세요.<br>
            스테이지가 오를수록 거리가 멀어지고<br>술래의 패턴이 다양해집니다!
        </p>
        <button id="btnStart" class="bg-green-500 hover:bg-green-400 text-white px-10 py-5 rounded-full text-2xl md:text-3xl font-bold shadow-[0_6px_0_#166534] active:translate-y-2 active:shadow-none transition-all animate-pulse">
            게임 시작
        </button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const uiOverlay = document.getElementById('uiOverlay');
        const uiTitle = document.getElementById('uiTitle');
        const uiDesc = document.getElementById('uiDesc');
        const btnStart = document.getElementById('btnStart');
        const btnLeft = document.getElementById('btnLeft');
        const btnRight = document.getElementById('btnRight');
        
        const distText = document.getElementById('distText');
        const stageText = document.getElementById('stageText');
        const scoreText = document.getElementById('scoreText');

        let gameState = 'READY';
        let animationFrameId = null;
        
        let currentStage = 1;
        let totalScore = 0;
        let targetMeters = 20; 
        
        let WORLD_START_Y = targetMeters * 20;
        const WORLD_FINISH_Y = 0;
        let cameraY = 0;
        let currentRank = 1;

        let player = {
            id: 'player', x: 0, y: 0, radius: 18, stepSize: 10, lastFoot: null, 
            color: '#3b82f6', isAlive: true, hasFinished: false, rank: 0
        };

        let bots = [];
        
        function initBots() {
            const speedMod = Math.max(0, (currentStage - 1) * 10);
            const reactMod = Math.max(0, (currentStage - 1) * 8);

            // 봇들의 caution 수치를 상향 조정하여 더 잘 멈추도록 개선
            bots = [
                { id: 'bot1', x: 0, y: WORLD_START_Y, radius: 18, stepSize: 10, lastFoot: 'left', color: '#ef4444', isAlive: true, hasFinished: false, rank: 0, 
                  reactionTime: Math.max(50, 160 - reactMod), stepInterval: Math.max(70, 150 - speedMod), nextStepTime: 0, lastMoveTime: 0, caution: 0.80, name: '다혈질' }, // caution 0.25 -> 0.60
                { id: 'bot2', x: 0, y: WORLD_START_Y, radius: 18, stepSize: 10, lastFoot: 'left', color: '#a855f7', isAlive: true, hasFinished: false, rank: 0, 
                  reactionTime: Math.max(40, 110 - reactMod), stepInterval: Math.max(90, 180 - speedMod), nextStepTime: 0, lastMoveTime: 0, caution: 0.85, name: '무난이' }, // caution 0.65 -> 0.85
                { id: 'bot3', x: 0, y: WORLD_START_Y, radius: 18, stepSize: 10, lastFoot: 'left', color: '#f97316', isAlive: true, hasFinished: false, rank: 0, 
                  reactionTime: Math.max(30, 70 - reactMod), stepInterval: Math.max(120, 220 - speedMod), nextStepTime: 0, lastMoveTime: 0, caution: 0.98, name: '신중이' }  // caution 0.95 -> 0.98
            ];
        }

        const BASE_PATTERNS = [
            [{t:'무',d:250},{t:'궁',d:250},{t:'화',d:250},{t:' ',d:0},{t:'꽃',d:200},{t:'이',d:200},{t:' ',d:0},{t:'피',d:150},{t:'었',d:150},{t:'습',d:150},{t:'니',d:100},{t:'다',d:100},{t:'!',d:300}],
            [{t:'무',d:200},{t:'궁',d:200},{t:'화',d:200},{t:' ',d:0},{t:'꽃~',d:1000},{t:'~이',d:300},{t:' ',d:0},{t:'피',d:150},{t:'었',d:150},{t:'습',d:100},{t:'니',d:100},{t:'닷',d:100},{t:'!',d:200}],
            [{t:'무~',d:600},{t:'궁~',d:600},{t:'화~',d:600},{t:' ',d:0},{t:'꽃',d:80},{t:'이',d:80},{t:'폈',d:80},{t:'다',d:80},{t:'!',d:200}],
            [{t:'무',d:90},{t:'궁',d:90},{t:'화',d:90},{t:'꽃',d:90},{t:'이',d:90},{t:'피',d:90},{t:'었',d:90},{t:'습',d:90},{t:'니',d:90},{t:'닷',d:90},{t:'!',d:250}],
            [{t:'무',d:200},{t:'궁',d:200},{t:'화',d:200},{t:' ',d:0},{t:'꽃',d:200},{t:'이',d:200},{t:' ',d:0},{t:'피',d:150},{t:'었',d:150},{t:'습',d:150},{t:'니~',d:500},{t:'다~',d:500},{t:'!',d:200}]
        ];

        let activePatterns = [];

        let tagger = {
            x: 0, y: -80, radius: 28,
            isLookingFront: false, state: 'SPEAKING',
            currentPattern: [], phraseIndex: 0,
            nextActionTime: 0, speechBubble: "", history: []
        };

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight - document.getElementById('controls').offsetHeight;
            tagger.x = canvas.width / 2;
            
            const slotWidth = canvas.width / 5;
            if (bots.length > 0) {
                bots[0].x = slotWidth * 1;
                player.x = slotWidth * 2.5; 
                bots[1].x = slotWidth * 3.5;
                bots[2].x = slotWidth * 4.5;
            }
        }
        window.addEventListener('resize', resizeCanvas);

        function startGame(isNewGame = false) {
            if (isNewGame) {
                currentStage = 1;
                totalScore = 0;
            }
            
            targetMeters = currentStage * 20;
            WORLD_START_Y = targetMeters * 20;
            
            let maxPatternIndex = Math.min(BASE_PATTERNS.length, currentStage + 1);
            let speedMultiplier = Math.max(0.4, 1.0 - (currentStage - 1) * 0.1);

            activePatterns = BASE_PATTERNS.slice(0, maxPatternIndex).map(pattern => 
                pattern.map(p => ({ t: p.t, d: p.d * speedMultiplier }))
            );

            gameState = 'PLAYING';
            uiOverlay.style.display = 'none';
            currentRank = 1;
            
            player.y = WORLD_START_Y;
            player.lastFoot = null;
            player.isAlive = true;
            player.hasFinished = false;
            player.rank = 0;
            cameraY = WORLD_START_Y - canvas.height * 0.7;
            
            initBots();
            resizeCanvas();

            tagger.isLookingFront = false;
            tagger.state = 'SPEAKING';
            tagger.currentPattern = activePatterns[0];
            tagger.phraseIndex = 0;
            tagger.speechBubble = "";
            tagger.history = [];
            tagger.nextActionTime = performance.now() + 1000;
            
            updateUI();
            
            if(animationFrameId) cancelAnimationFrame(animationFrameId);
            requestAnimationFrame(gameLoop);
        }

        function updateUI() {
            let remain = Math.max(0, Math.floor(player.y / 20)); 
            if(!player.isAlive && player.hasFinished) remain = 0;
            
            distText.innerText = remain;
            stageText.innerText = currentStage;
            scoreText.innerText = totalScore;
        }

        function finishGame(type) {
            gameState = 'ENDED';
            uiOverlay.style.display = 'flex';
            
            if (type === 'GAMEOVER') {
                let distanceTraveled = Math.max(0, Math.floor((WORLD_START_Y - player.y) / 20));
                totalScore += distanceTraveled;

                uiTitle.innerHTML = "탈락!";
                uiTitle.className = "text-6xl font-black text-red-500 mb-4 text-center drop-shadow-lg";
                uiDesc.innerHTML = `앗! 술래에게 들켰습니다.<br><br>최종 도달 스테이지: <span class="text-yellow-400 font-bold">STAGE ${currentStage}</span><br>이번 스테이지 기록: ${distanceTraveled}m<br>누적 총 거리: <span class="text-green-400 font-bold">${totalScore}m</span>`;
                btnStart.innerText = "처음부터 다시";
                btnStart.onclick = () => startGame(true);
            } else if (type === 'CLEAR') {
                totalScore += targetMeters;
                uiTitle.innerHTML = "스테이지 클리어!";
                uiTitle.className = "text-5xl md:text-6xl font-black text-yellow-400 mb-4 text-center drop-shadow-lg";
                
                currentStage++;
                let nextDist = currentStage * 20;
                uiDesc.innerHTML = `무사히 결승선을 통과했습니다!<br><br>다음 목표: <span class="text-blue-300 font-bold">STAGE ${currentStage} (${nextDist}m)</span><br>술래의 패턴이 더 빨라지고 다양해집니다!`;
                btnStart.innerText = "다음 스테이지 도전";
                btnStart.onclick = () => startGame(false);
            }
            updateUI();
        }

        function movePlayer(foot) {
            if (gameState !== 'PLAYING' || !player.isAlive || player.hasFinished) return;

            if (tagger.isLookingFront) {
                player.isAlive = false;
                checkGameEnd();
                return;
            }

            if (player.lastFoot !== foot) {
                player.y -= player.stepSize;
                player.lastFoot = foot;
                
                if (player.y <= WORLD_FINISH_Y) {
                    player.hasFinished = true;
                    player.rank = currentRank++;
                    checkGameEnd();
                }
                updateUI();
            }
        }

        function checkGameEnd() {
            let playerDone = !player.isAlive || player.hasFinished;
            if (playerDone) {
                setTimeout(() => {
                    if (!player.isAlive) finishGame('GAMEOVER');
                    else finishGame('CLEAR');
                }, 1000); 
            }
        }

        function addInputEvent(element, foot) {
            const handler = (e) => {
                e.preventDefault();
                movePlayer(foot);
                element.classList.add('active');
                setTimeout(() => element.classList.remove('active'), 100);
            };
            element.addEventListener('touchstart', handler, {passive: false});
            element.addEventListener('mousedown', handler);
        }

        addInputEvent(btnLeft, 'left');
        addInputEvent(btnRight, 'right');
        btnStart.onclick = () => startGame(true);

        function updateTagger(timestamp) {
            tagger.history.push({ t: timestamp, looking: tagger.isLookingFront });
            if (tagger.history.length > 0 && timestamp - tagger.history[0].t > 1000) {
                tagger.history.shift();
            }

            if (timestamp > tagger.nextActionTime) {
                if (tagger.state === 'SPEAKING') {
                    tagger.speechBubble = tagger.currentPattern.slice(0, tagger.phraseIndex + 1).map(p => p.t).join('');
                    let currentDelay = tagger.currentPattern[tagger.phraseIndex].d;
                    tagger.phraseIndex++;

                    if (tagger.phraseIndex >= tagger.currentPattern.length) {
                        tagger.state = 'LOOKING';
                        tagger.isLookingFront = true;
                        let minLook = Math.max(300, 800 - currentStage * 50);
                        tagger.nextActionTime = timestamp + minLook + Math.random() * 800; 
                    } else {
                        tagger.nextActionTime = timestamp + currentDelay;
                    }
                } else if (tagger.state === 'LOOKING') {
                    tagger.state = 'SPEAKING';
                    tagger.isLookingFront = false;
                    tagger.currentPattern = activePatterns[Math.floor(Math.random() * activePatterns.length)];
                    tagger.phraseIndex = 0;
                    tagger.speechBubble = "";
                    tagger.nextActionTime = timestamp + 300 + Math.random() * 300; 
                }
            }
        }

        function updateBots(timestamp) {
            bots.forEach(bot => {
                if (!bot.isAlive || bot.hasFinished) return;

                let pastState = tagger.history.find(h => h.t >= timestamp - bot.reactionTime);
                let perceivedLooking = pastState ? pastState.looking : tagger.isLookingFront;

                if (!perceivedLooking) {
                    if (timestamp > bot.nextStepTime) {
                        let shouldStop = false;
                        let progress = tagger.phraseIndex / tagger.currentPattern.length;
                        
                        // 봇들의 눈치보기 조건: 진행률 55%부터 눈치보기 시작 (이전 65%에서 더 앞당김)
                        if (tagger.state === 'SPEAKING' && progress > 0.55) {
                            if (Math.random() < bot.caution) shouldStop = true;
                        }

                        if (shouldStop) {
                            bot.nextStepTime = timestamp + 100; 
                        } else {
                            bot.y -= bot.stepSize;
                            bot.lastFoot = bot.lastFoot === 'left' ? 'right' : 'left';
                            bot.nextStepTime = timestamp + bot.stepInterval + (Math.random() * 40 - 20);
                            bot.lastMoveTime = timestamp;

                            if (bot.y <= WORLD_FINISH_Y) {
                                bot.hasFinished = true;
                                bot.rank = currentRank++;
                            }
                        }
                    }
                }

                if (tagger.isLookingFront && (timestamp - bot.lastMoveTime < 100)) {
                    bot.isAlive = false;
                }
            });
        }

        function drawTaggerGraphics(t) {
            ctx.fillStyle = '#ec4899';
            ctx.beginPath(); ctx.arc(0, 20, 20, Math.PI, 0); ctx.fill(); // 몸통
            
            ctx.beginPath(); ctx.arc(0, 0, t.radius, 0, Math.PI * 2);
            if (t.isLookingFront) {
                ctx.fillStyle = '#fcd34d'; ctx.fill(); // 얼굴
                ctx.fillStyle = 'black'; ctx.fillRect(-12, -8, 6, 6); ctx.fillRect(6, -8, 6, 6); // 눈
                ctx.fillStyle = 'red'; ctx.beginPath(); ctx.arc(0, 10, 6, 0, Math.PI * 2); ctx.fill(); // 입
                
                ctx.fillStyle = 'rgba(239, 68, 68, 0.4)';
                ctx.beginPath();
                ctx.moveTo(0, t.radius);
                ctx.lineTo(-canvas.width*2, canvas.height + 500);
                ctx.lineTo(canvas.width*3, canvas.height + 500);
                ctx.fill();
            } else {
                ctx.fillStyle = '#1f2937'; ctx.fill(); // 머리 뒤통수
                
                // 심플한 뒤통수 디자인 (단발 느낌의 덩어리로 표현)
                ctx.fillStyle = '#111827';
                ctx.beginPath();
                ctx.arc(0, 5, t.radius + 2, 0, Math.PI); // 머리카락 하단
                ctx.fill();
            }
        }

        function drawCharacter(char) {
            ctx.save();
            ctx.translate(char.x, char.y);
            
            if (!char.isAlive) ctx.globalAlpha = 0.4;
            if (char.hasFinished) {
                ctx.shadowColor = 'yellow';
                ctx.shadowBlur = 15;
            }

            ctx.fillStyle = char.color;
            ctx.fillRect(-15, 0, 30, 20);
            ctx.beginPath(); ctx.arc(0, -10, char.radius, 0, Math.PI * 2); ctx.fill();

            ctx.fillStyle = '#111';
            if (char.lastFoot === 'left') {
                ctx.fillRect(-15, 20, 12, 12); ctx.fillRect(3, 10, 12, 12);
            } else if (char.lastFoot === 'right') {
                ctx.fillRect(-15, 10, 12, 12); ctx.fillRect(3, 20, 12, 12);
            } else {
                ctx.fillRect(-15, 20, 12, 12); ctx.fillRect(3, 20, 12, 12);
            }

            if (!char.isAlive) {
                ctx.strokeStyle = 'red'; ctx.lineWidth = 6;
                ctx.beginPath(); ctx.moveTo(-20, -30); ctx.lineTo(20, 10); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(20, -30); ctx.lineTo(-20, 10); ctx.stroke();
            }
            
            ctx.fillStyle = 'white'; ctx.font = 'bold 12px sans-serif'; ctx.textAlign = 'center';
            ctx.shadowBlur = 0; 
            let label = char.id === 'player' ? '나' : char.name;
            if (char.hasFinished) label = `${char.rank}등`;
            ctx.fillText(label, 0, -35);

            ctx.restore();
        };

        function draw(timestamp) {
            if (player.isAlive && !player.hasFinished) {
                let targetCameraY = player.y - canvas.height * 0.7; 
                cameraY += (targetCameraY - cameraY) * 0.1;
            }
            if (cameraY < -150) cameraY = -150; 

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.translate(0, -cameraY);

            ctx.strokeStyle = 'rgba(0,0,0,0.1)';
            ctx.lineWidth = 2;
            for (let i = 0; i <= WORLD_START_Y + 100; i += 100) {
                ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke();
                if(i % 400 === 0 && i !== 0) {
                    ctx.fillStyle = 'rgba(0,0,0,0.2)'; ctx.font = 'bold 24px sans-serif';
                    ctx.fillText(`${i/20}m`, 10, i - 10);
                }
            }

            ctx.fillStyle = '#fca5a5'; ctx.fillRect(0, WORLD_FINISH_Y, canvas.width, 20);
            ctx.fillStyle = '#b91c1c';
            for(let i=0; i<canvas.width; i+=40) ctx.fillRect(i, WORLD_FINISH_Y, 20, 20);
            ctx.fillStyle = 'white'; ctx.fillRect(0, WORLD_START_Y + 20, canvas.width, 10);

            ctx.save();
            ctx.translate(tagger.x, tagger.y);
            drawTaggerGraphics(tagger);
            ctx.restore();

            let allChars = [...bots, player].sort((a, b) => a.y - b.y);
            allChars.forEach(drawCharacter);
            ctx.restore(); 

            let taggerScreenY = tagger.y - cameraY;
            if (taggerScreenY < 50) { 
                const pipSize = 90;
                const pipX = canvas.width - pipSize - 15;
                const pipY = 70;

                ctx.save();
                ctx.fillStyle = '#1f2937'; 
                ctx.strokeStyle = '#facc15'; 
                if (tagger.isLookingFront) ctx.strokeStyle = '#ef4444'; 
                ctx.lineWidth = 4;
                ctx.beginPath(); ctx.roundRect(pipX, pipY, pipSize, pipSize, 12);
                ctx.fill(); ctx.stroke();
                ctx.clip(); 

                ctx.translate(pipX + pipSize/2, pipY + pipSize/2 + 10);
                ctx.scale(1.2, 1.2); 
                drawTaggerGraphics(tagger);
                ctx.restore();

                ctx.fillStyle = 'white'; ctx.font = '10px sans-serif'; ctx.textAlign = 'center';
                ctx.fillText('술래 CAM', pipX + pipSize/2, pipY - 5);
            }

            // B. 술래 대사 / 경고 텍스트 (반응형 폰트 사이즈)
            if (!tagger.isLookingFront && tagger.speechBubble) {
                ctx.save();
                ctx.fillStyle = 'white'; ctx.strokeStyle = '#ec4899'; ctx.lineWidth = 4;
                
                // 화면 너비에 따라 글자 크기를 조절하여 넘어가지 않게 방지
                // 최대 40px, 화면이 작으면 줄어들도록 설정
                let maxFontSize = 40;
                let fontSize = Math.min(maxFontSize, (canvas.width * 0.8) / (tagger.speechBubble.length || 1));
                ctx.font = `900 ${fontSize}px sans-serif`;
                
                const textWidth = ctx.measureText(tagger.speechBubble).width;
                const padding = 30; 
                const bx = canvas.width / 2 - (textWidth + padding) / 2;
                const by = 80;

                ctx.beginPath(); ctx.roundRect(bx, by, textWidth + padding, fontSize * 1.5, 25);
                ctx.fill(); ctx.stroke();
                
                ctx.fillStyle = 'black'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText(tagger.speechBubble, canvas.width / 2, by + (fontSize * 1.5) / 2);
                ctx.restore();
            } 
            else if (tagger.isLookingFront) {
                ctx.save();
                ctx.fillStyle = '#ef4444'; ctx.strokeStyle = 'white'; ctx.lineWidth = 6;
                ctx.font = '900 48px sans-serif'; 
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.strokeText('👀 멈춰!', canvas.width / 2, 110);
                ctx.fillText('👀 멈춰!', canvas.width / 2, 110);
                ctx.restore();
            }
        }

        function gameLoop(timestamp) {
            if (gameState === 'PLAYING') {
                updateTagger(timestamp);
                updateBots(timestamp);
                draw(timestamp);
                animationFrameId = requestAnimationFrame(gameLoop);
            } else if (gameState === 'ENDED') {
                draw(timestamp);
            }
        }

        resizeCanvas();
        draw(0);
    </script>
</body>
</html>
