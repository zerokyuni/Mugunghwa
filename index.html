<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>무궁화꽃이 피었습니다!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html, body {
            width: 100%; height: 100dvh;
            margin: 0; padding: 0;
            touch-action: none; overflow: hidden;
            background-color: #4ade80;
        }
        #gameCanvas { display: block; width: 100%; height: 100%; }
        .step-btn { transition: transform 0.05s, background-color 0.1s; }
        .step-btn:active, .step-btn.active { transform: scale(0.92); background-color: #f59e0b; box-shadow: none !important; margin-top: 4px; }
    </style>
</head>
<body class="w-full h-full flex flex-col relative select-none font-sans">

    <div class="absolute top-0 left-0 w-full p-4 flex justify-between items-start z-10 pointer-events-none">
        <div class="flex flex-col gap-2">
            <div class="bg-gray-900 bg-opacity-80 text-white px-4 py-2 rounded-full font-bold shadow-md text-sm md:text-base pointer-events-none">
                STAGE <span id="stageText" class="text-yellow-400">1</span>
            </div>
        </div>
        <div class="flex flex-col gap-2 items-end pointer-events-none">
            <div class="bg-blue-600 text-white px-4 py-2 rounded-full font-bold shadow-md text-sm md:text-base">
                남은 거리: <span id="distText">20</span>m
            </div>
            <div class="bg-gray-900 bg-opacity-80 text-white px-4 py-2 rounded-full font-bold shadow-md text-xs">
                접속: <span id="playerCount">1</span>명
            </div>
        </div>
    </div>

    <canvas id="gameCanvas" class="flex-grow"></canvas>

    <div id="controls" class="h-32 bg-gray-800 flex justify-between items-center p-4 gap-4 z-10 w-full shrink-0 shadow-[0_-4px_10px_rgba(0,0,0,0.3)]">
        <button id="btnLeft" class="step-btn flex-1 h-full bg-yellow-400 rounded-2xl text-2xl font-black text-gray-900 shadow-[0_8px_0_#b45309]">
            왼발 👣 (←)
        </button>
        <button id="btnRight" class="step-btn flex-1 h-full bg-yellow-400 rounded-2xl text-2xl font-black text-gray-900 shadow-[0_8px_0_#b45309]">
            오른발 👣 (→)
        </button>
    </div>

    <div id="uiOverlay" class="absolute inset-0 bg-black bg-opacity-80 flex flex-col items-center justify-center z-20 transition-opacity">
        <h1 id="uiTitle" class="text-5xl md:text-7xl font-black text-white mb-2 text-center drop-shadow-lg">접속 중...</h1>
        <p id="uiDesc" class="text-white text-lg md:text-xl mb-8 text-center px-6 leading-relaxed">
            서버와 데이터를 동기화하고 있습니다.<br>잠시만 기다려주세요!
        </p>
        <button id="btnStart" class="hidden bg-green-500 hover:bg-green-400 text-white px-10 py-5 rounded-full text-2xl md:text-3xl font-bold shadow-[0_6px_0_#166534] active:translate-y-2 transition-all animate-pulse">
            게임 시작하기
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getDatabase, ref, update, onValue, onDisconnect, remove, set, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDQ6QT1gRdh0yTm8_yT6j__Bb-VDHwx4xE",
            authDomain: "mugunghwa-game-938ed.firebaseapp.com",
            databaseURL: "https://mugunghwa-game-938ed-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "mugunghwa-game-938ed",
            storageBucket: "mugunghwa-game-938ed.firebasestorage.app",
            messagingSenderId: "500124015152",
            appId: "1:500124015152:web:2e24d8ef54d388ce01abf5"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app); 
        const safeAppId = "game_v9_stable"; 

        const UI = {
            overlay: document.getElementById('uiOverlay'), title: document.getElementById('uiTitle'),
            desc: document.getElementById('uiDesc'), btnStart: document.getElementById('btnStart'),
            distText: document.getElementById('distText'), stageText: document.getElementById('stageText'),
            playerCount: document.getElementById('playerCount')
        };

        let serverOffset = 0;
        const getSyncedNow = () => Date.now() + serverOffset;
        onValue(ref(db, ".info/serverTimeOffset"), (snap) => { serverOffset = snap.val() || 0; });

        let myUid = null;
        let isHost = false;
        let gameState = 'CONNECTING'; 
        let currentStage = 1;
        let lastSyncedStage = 0;
        let WORLD_START_Y = 400;
        const WORLD_FINISH_Y = 0;
        let cameraY = 0;
        let globalTaggerData = null; 
        let lastMoveTime = Date.now();
        let invulnerableUntil = 0; 

        let myPlayer = { 
            x: 0, y: 0, radius: 18, stepSize: 10, lastFoot: null, 
            color: '#3b82f6', isAlive: true, hasFinished: false, name: '나', deathReason: '',
            displayScore: 0, joinedAt: Date.now(), lastActive: Date.now()
        };
        let remotePlayers = {};
        let bots = [];
        
        const BASE_PATTERNS = [
            [{t:'무',d:250},{t:'궁',d:250},{t:'화',d:250},{t:' ',d:0},{t:'꽃',d:200},{t:'이',d:200},{t:' ',d:0},{t:'피',d:150},{t:'었',d:150},{t:'습',d:150},{t:'니',d:100},{t:'다',d:100},{t:'!',d:300}], 
            [{t:'무~',d:600},{t:'궁~',d:600},{t:'화~',d:600},{t:' ',d:0},{t:'꽃',d:120},{t:'이',d:120},{t:'폈',d:120},{t:'다',d:120},{t:'!',d:200}], 
            [{t:'무',d:200},{t:'궁',d:200},{t:'화',d:200},{t:' ',d:0},{t:'꽃~',d:1000},{t:'~이',d:300},{t:' ',d:0},{t:'피',d:150},{t:'었',d:150},{t:'습',d:100},{t:'니',d:100},{t:'닷',d:100},{t:'!',d:200}], 
            [{t:'무',d:80},{t:'궁',d:80},{t:'화',d:80},{t:'꽃',d:80},{t:'이',d:80},{t:'피',d:80},{t:'었',d:80},{t:'습',d:80},{t:'니',d:80},{t:'닷',d:80},{t:'!',d:250}], 
            [{t:'무',d:200},{t:'궁',d:200},{t:'화',d:200},{t:' ',d:0},{t:'꽃',d:200},{t:'이',d:200},{t:' ',d:0},{t:'피',d:150},{t:'었',d:150},{t:'습',d:150},{t:'니~',d:600},{t:'다~',d:600},{t:'!',d:200}], 
            [{t:'무',d:40},{t:'궁',d:40},{t:'화',d:40},{t:'꽃',d:40},{t:'이',d:40},{t:'피',d:40},{t:'었',d:40},{t:'습',d:40},{t:'니',d:40},{t:'다',d:40},{t:'!',d:100}], 
            [{t:'무',d:150},{t:'궁',d:150},{t:'화',d:150},{t:'...',d:1000},{t:'꽃',d:50},{t:'이',d:50},{t:'피',d:50},{t:'었',d:50},{t:'습',d:50},{t:'니',d:50},{t:'다',d:50},{t:'!',d:150}], 
            [{t:'무',d:300},{t:'궁',d:50},{t:'화',d:300},{t:'꽃',d:50},{t:'이',d:300},{t:'피',d:50},{t:'었',d:300},{t:'습',d:50},{t:'니',d:300},{t:'다',d:50},{t:'!',d:200}], 
            [{t:'무궁화 ',d:150},{t:'꽃이 ',d:150},{t:'피었',d:100},{t:'습니다!',d:100}], 
            [{t:'무',d:50},{t:'궁',d:50},{t:'화',d:50},{t:'꽃',d:50},{t:'폈',d:50},{t:'다',d:50},{t:'!',d:150}], 
            [{t:'무',d:60},{t:'궁',d:60},{t:'화',d:60},{t:'꽃',d:60},{t:'핌',d:60},{t:'!',d:120}], 
            [{t:'무~~~~',d:900},{t:'궁',d:100},{t:'화',d:100},{t:'꽃 ',d:200},{t:'이~~ ',d:700},{t:'피~ ',d:500},{t:'었~~~ ',d:800},{t:'습',d:100},{t:'니',d:100},{t:'다',d:100},{t:'!',d:200}], 
            [{t:'무  ',d:250},{t:'궁',d:100},{t:'화',d:100},{t:'꽃',d:100},{t:'잎 ',d:200},{t:'이',d:100},{t:'피',d:100},{t:'었 ',d:200},{t:'슴',d:100},{t:'다',d:100},{t:'!',d:200}], 
            [{t:'The ',d:200},{t:'hi',d:100},{t:'bis',d:100},{t:'cus ',d:200},{t:'has ',d:200},{t:'bloom',d:150},{t:'ed',d:150},{t:'!',d:250}], 
            [{t:'무',d:150},{t:'궁',d:150},{t:'화',d:150},{t:' ',d:0},{t:'꽃',d:150},{t:'이',d:150},{t:' ',d:0},{t:'피',d:150},{t:'었',d:150},{t:'습',d:150},{t:'니',d:150},{t:'...',d:1500},{t:'다',d:30},{t:'!',d:50}]
        ];

        let tagger = { x: 0, y: -80, radius: 28, isLookingFront: false, speechBubble: "", isPickingNext: false };
        let guardAnims = []; 

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight - document.getElementById('controls').offsetHeight;
            tagger.x = canvas.width / 2;
        }
        window.addEventListener('resize', resize);
        resize();

        const ROOM_PATH = `rooms/${safeAppId}/squid`;
        const PLAYERS_REF = ref(db, `${ROOM_PATH}/players`);
        const STATE_REF = ref(db, `${ROOM_PATH}/globalState`);

        signInAnonymously(auth).then(() => {
            onAuthStateChanged(auth, (user) => {
                if (user) {
                    myUid = user.uid;
                    myPlayer.name = '유저 ' + myUid.substring(0, 4);
                    myPlayer.color = ['#3b82f6', '#10b981', '#f59e0b', '#8b5cf6', '#ec4899'][Math.floor(Math.random()*5)];
                    const myRef = ref(db, `${ROOM_PATH}/players/${myUid}`);
                    onDisconnect(myRef).remove();
                    set(myRef, { 
                        uid: myUid, y: 0, isAlive: true, joinedAt: serverTimestamp(), 
                        lastActive: serverTimestamp(), color: myPlayer.color, name: myPlayer.name
                    });
                    setupMultiplayer();
                }
            });
        });

        function setupMultiplayer() {
            onValue(STATE_REF, (snapshot) => {
                const data = snapshot.val();
                if (!data) return;
                
                globalTaggerData = data.taggerData;
                if (data.bots && !isHost) bots = data.bots;
                
                // 스테이지 동기화
                currentStage = data.stage || 1;
                UI.stageText.innerText = currentStage;
                
                if (data.status === 'PLAYING' && gameState !== 'PLAYING') {
                    startGame(true); 
                } else if (data.status === 'CLEARED_PENDING' && gameState !== 'ENDED') {
                    triggerGlobalReset('CLEARED');
                } else if (data.status === 'HUMANS_DEAD' && gameState !== 'ENDED') {
                    triggerGlobalReset('ALL_DEAD_MANUAL');
                } else if (data.status === 'RESET') {
                    // 서버에서 리셋 명령이 내려오면 즉시 재시작
                    if (lastSyncedStage !== data.stage) {
                        lastSyncedStage = data.stage;
                        startGame(true);
                    }
                }
            });

            onValue(PLAYERS_REF, (snapshot) => {
                const now = getSyncedNow();
                const playersData = snapshot.val() || {};
                const uids = Object.keys(playersData);
                const activeOnes = uids.map(id => ({id, ...playersData[id]}))
                                       .filter(p => now - (p.lastActive || 0) < 4000)
                                       .sort((a,b) => (a.joinedAt || 0) - (b.joinedAt || 0));

                isHost = (activeOnes.length > 0 && activeOnes[0].id === myUid);
                
                uids.forEach(uid => {
                    const data = playersData[uid];
                    if (uid === myUid) {
                        if (myPlayer.isAlive && data.isAlive === false) {
                            myPlayer.isAlive = false;
                            myPlayer.deathReason = data.deathReason;
                        }
                    } else {
                        if (!remotePlayers[uid]) remotePlayers[uid] = { ...data, x: 0, displayY: data.y || 400 };
                        remotePlayers[uid] = { ...remotePlayers[uid], ...data, localLastUpdate: now };
                    }
                });

                Object.keys(remotePlayers).forEach(uid => { if (!uids.includes(uid)) delete remotePlayers[uid]; });
                UI.playerCount.innerText = uids.length;

                if (gameState === 'CONNECTING') {
                    UI.title.innerText = "준비 완료!";
                    UI.desc.innerHTML = `테스트 버전 .<br>서버 동기화 성공.`;
                    UI.btnStart.classList.remove('hidden');
                }
            });

            setInterval(() => {
                if (myUid) update(ref(db, `${ROOM_PATH}/players/${myUid}`), { lastActive: serverTimestamp() });
            }, 800);

            setInterval(syncLocalPlayer, 200); 
            setInterval(syncHostState, 300); 
            requestAnimationFrame(gameLoop);
        }

        function initBots() {
            const speedMod = (currentStage - 1) * 16;
            WORLD_START_Y = (currentStage * 20) * 20;
            bots = [
                { id: 'bot1', y: WORLD_START_Y, stepSize: 12, stepInterval: Math.max(45, 100 - speedMod), lastFoot: 'left', color: '#ef4444', isAlive: true, hasFinished: false, name: '[BOT] 다혈질', joinedAt: 1 },
                { id: 'bot2', y: WORLD_START_Y, stepSize: 11, stepInterval: Math.max(65, 130 - speedMod), lastFoot: 'left', color: '#a855f7', isAlive: true, hasFinished: false, name: '[BOT] 무난이', joinedAt: 2 },
                { id: 'bot3', y: WORLD_START_Y, stepSize: 10, stepInterval: Math.max(85, 160 - speedMod), lastFoot: 'left', color: '#f97316', isAlive: true, hasFinished: false, name: '[BOT] 신중이', joinedAt: 3 }
            ];
            bots.forEach(b => { b.displayY = b.y; });
        }

        function syncLocalPlayer() {
            if (!myUid || gameState !== 'PLAYING') return;
            update(ref(db, `${ROOM_PATH}/players/${myUid}`), { 
                y: myPlayer.y, isAlive: !!myPlayer.isAlive, hasFinished: !!myPlayer.hasFinished, 
                lastFoot: myPlayer.lastFoot || 'left', deathReason: myPlayer.deathReason || '', 
                lastMoveTime: lastMoveTime || 0, displayScore: myPlayer.displayScore || 0
            });
        }

        function setNextTaggerPattern() {
            if (!isHost || gameState !== 'PLAYING') return;
            let pid = Math.floor(Math.random() * BASE_PATTERNS.length);
            let spd = Math.max(0.4, 1.0 - (currentStage - 1) * 0.08);
            let lookDur = 1000 + Math.random() * 1000;
            
            // 패턴 예약 시점을 1.5초 뒤로 설정하여 모든 유저가 충분히 인지하게 함
            update(STATE_REF, {
                taggerData: { patternId: pid, speed: spd, startTime: getSyncedNow() + 1500, lookDuration: lookDur }
            });
        }

        function syncHostState() {
            if (!isHost || gameState !== 'PLAYING') return;
            checkRoundProgression();
            const botData = bots.map(b => ({
                id: b.id, y: b.y, lastFoot: b.lastFoot, isAlive: b.isAlive, 
                hasFinished: b.hasFinished, name: b.name, color: b.color, joinedAt: b.joinedAt,
                displayScore: b.displayScore || 0
            }));
            update(STATE_REF, { stage: currentStage, status: gameState, bots: botData });
        }

        function checkRoundProgression() {
            if (!isHost || gameState !== 'PLAYING') return;
            
            const humans = Object.values(remotePlayers).concat([myPlayer]);
            const alive = humans.filter(p => p.isAlive && !p.hasFinished).length;
            const cleared = humans.filter(p => p.hasFinished).length;
            
            if (cleared > 0) {
                // 스테이지 클리어
                update(STATE_REF, { status: 'CLEARED_PENDING' });
                setTimeout(() => { 
                    if (!isHost) return; // 호스트가 바뀌었을 수도 있음
                    const nextStage = currentStage + 1;
                    update(STATE_REF, { 
                        status: 'RESET', 
                        stage: nextStage,
                        taggerData: null, // 다음 스테이지를 위해 데이터 비움
                        bots: [] 
                    });
                }, 4000); // 4초 여유
            } else if (alive === 0 && bots.every(b => !b.isAlive || b.hasFinished)) {
                update(STATE_REF, { status: 'HUMANS_DEAD' });
            }
        }

        function triggerGlobalReset(reason) {
            gameState = 'ENDED'; UI.overlay.style.display = 'flex';
            if (reason === 'CLEARED') {
                UI.title.innerHTML = "라운드 종료!"; UI.title.className = "text-5xl font-black text-yellow-400 mb-2";
                UI.desc.innerHTML = `결승선 도착! 다음 라운드로 진출합니다.<br><span class="text-sm">잠시 후 자동 시작됩니다...</span>`;
                UI.btnStart.classList.add('hidden');
            } else {
                UI.title.innerHTML = "인간 전멸!"; UI.title.className = "text-6xl font-black text-red-500 mb-2";
                UI.desc.innerHTML = `모든 플레이어가 탈락했습니다.`;
                UI.btnStart.innerText = "다시 시작 (STAGE 1)";
                UI.btnStart.classList.remove('hidden');
                UI.btnStart.onclick = claimHostAndRestart;
            }
        }

        function claimHostAndRestart() {
            UI.btnStart.classList.add('hidden');
            UI.desc.innerHTML = "게임 데이터를 초기화 중입니다...";
            update(STATE_REF, { 
                status: 'RESET', 
                stage: 1, 
                taggerData: null, 
                bots: [] 
            }).then(() => {
                startGame(false);
            });
        }

        UI.btnStart.onclick = () => {
            update(STATE_REF, { status: 'PLAYING', stage: currentStage });
            startGame(false);
        };

        function startGame(isAutoStart = false) {
            gameState = 'PLAYING'; UI.overlay.style.display = 'none';
            const targetM = currentStage * 20; WORLD_START_Y = targetM * 20;
            
            // 위치 즉시 초기화 (도착 버그 해결)
            myPlayer.y = WORLD_START_Y; 
            myPlayer.isAlive = true; 
            myPlayer.hasFinished = false; 
            myPlayer.displayScore = 0; 
            myPlayer.deathReason = '';
            
            lastMoveTime = getSyncedNow(); 
            cameraY = WORLD_START_Y - 500;
            invulnerableUntil = getSyncedNow() + 1500; // 스테이지 시작 후 1.5초간 무적 (로딩 지연 대비)
            guardAnims = []; 
            
            if (myUid) update(ref(db, `${ROOM_PATH}/players/${myUid}`), { 
                isAlive: true, deathReason: '', y: WORLD_START_Y, displayScore: 0, hasFinished: false 
            });

            if (isHost) {
                if (bots.length === 0) initBots();
                bots.forEach(b => { 
                    b.y = WORLD_START_Y; 
                    b.displayY = b.y; 
                    b.isAlive = true; 
                    b.hasFinished = false; 
                    b.displayScore = 0;
                });
                setNextTaggerPattern();
            }
        }

        function movePlayer(foot) {
            if (gameState !== 'PLAYING' || !myPlayer.isAlive || myPlayer.hasFinished) return;
            if (getSyncedNow() < invulnerableUntil) return;
            if (tagger.isLookingFront) { die('moved'); return; }
            if (myPlayer.lastFoot !== foot) {
                myPlayer.y -= myPlayer.stepSize; myPlayer.lastFoot = foot;
                lastMoveTime = getSyncedNow(); 
                myPlayer.displayScore = Math.max(0, Math.floor((WORLD_START_Y - myPlayer.y) / 20));
                UI.distText.innerText = myPlayer.displayScore;
                if (myPlayer.y <= WORLD_FINISH_Y) { myPlayer.hasFinished = true; myPlayer.y = WORLD_FINISH_Y - 30; }
                syncLocalPlayer();
            }
        }

        function die(reason) {
            if (getSyncedNow() < invulnerableUntil) return;
            myPlayer.isAlive = false; myPlayer.deathReason = reason;
            if (reason === 'camp') { 
                guardAnims.push({ active: true, x: canvas.width + 100, y: myPlayer.y, targetX: myPlayer.x, alpha: 1 }); 
            }
            syncLocalPlayer();
        }

        window.addEventListener('keydown', (e) => {
            if (gameState !== 'PLAYING' || !myPlayer.isAlive) return;
            if (e.key === 'ArrowLeft') { movePlayer('left'); btnLeft.classList.add('active'); setTimeout(()=> btnLeft.classList.remove('active'), 100); }
            if (e.key === 'ArrowRight') { movePlayer('right'); btnRight.classList.add('active'); setTimeout(()=> btnRight.classList.remove('active'), 100); }
        });

        const btnLeft = document.getElementById('btnLeft');
        const btnRight = document.getElementById('btnRight');
        const addInput = (el, foot) => {
            const handler = (e) => { e.preventDefault(); movePlayer(foot); el.classList.add('active'); setTimeout(()=>el.classList.remove('active'),100); };
            el.addEventListener('touchstart', handler, {passive: false}); el.addEventListener('mousedown', handler);
        };
        addInput(btnLeft, 'left'); addInput(btnRight, 'right');

        function updateLogic() {
            const now = getSyncedNow();

            if (gameState === 'PLAYING' && myPlayer.isAlive && !myPlayer.hasFinished) {
                if (now - lastMoveTime > 5000 && tagger.isLookingFront) die('camp'); 
            }

            if (gameState === 'PLAYING' && globalTaggerData) {
                let elapsed = now - globalTaggerData.startTime;
                if (elapsed < 0) { tagger.isLookingFront = false; tagger.speechBubble = ""; } else {
                    let pattern = BASE_PATTERNS[globalTaggerData.patternId] || BASE_PATTERNS[0];
                    let accTime = 0; let bubble = ""; let isLooking = false; let isSpeaking = false;
                    for (let i = 0; i < pattern.length; i++) {
                        let dur = (pattern[i].d || 0) * globalTaggerData.speed; accTime += dur;
                        if (elapsed < accTime) { bubble = pattern.slice(0, i + 1).map(p => p.t).join(''); isSpeaking = true; break; }
                    }
                    if (!isSpeaking) {
                        if (elapsed < accTime + globalTaggerData.lookDuration) { isLooking = true; } else {
                            if (!tagger.isPickingNext) {
                                tagger.isPickingNext = true;
                                setTimeout(() => {
                                    // 릴레이 호스팅: 호스트 부재 시 1초 뒤 강제 트리거
                                    if (isHost || (now - (globalTaggerData.startTime + accTime + globalTaggerData.lookDuration) > 1000)) {
                                        setNextTaggerPattern();
                                    }
                                    tagger.isPickingNext = false;
                                }, 300);
                            }
                        }
                    }
                    tagger.speechBubble = bubble; tagger.isLookingFront = isLooking;
                }
            }

            if (isHost && gameState === 'PLAYING') {
                bots.forEach(bot => {
                    if (!bot.isAlive || bot.hasFinished) return;
                    if (!tagger.isLookingFront) {
                        if (now > (bot.nextStepTime || 0)) {
                            bot.y -= bot.stepSize; bot.lastFoot = bot.lastFoot === 'left' ? 'right' : 'left';
                            bot.displayScore = Math.max(0, Math.floor((WORLD_START_Y - bot.y) / 20));
                            bot.nextStepTime = now + bot.stepInterval + (Math.random() * 20);
                            bot.lastMoveTime = now;
                            if (bot.y <= WORLD_FINISH_Y) bot.hasFinished = true;
                        }
                    } else if (now - bot.lastMoveTime < 150) { bot.isAlive = false; }
                });
            }

            let allParticipants = [...bots, ...Object.values(remotePlayers), myPlayer];
            allParticipants.sort((a, b) => (a.joinedAt || 0) - (b.joinedAt || 0));
            const slotWidth = canvas.width / (allParticipants.length + 1);

            allParticipants.forEach((c, i) => {
                const targetX = slotWidth * (i + 1);
                if (!c.x || isNaN(c.x)) c.x = targetX;
                if (Math.abs(c.x - targetX) > 0.5) { c.x += (targetX - c.x) * 0.1; } 
                else { c.x = targetX; }
            });
        }

        function drawTagger(t) {
            ctx.fillStyle = '#ec4899'; ctx.beginPath(); ctx.arc(0, 20, 20, Math.PI, 0); ctx.fill(); 
            ctx.beginPath(); ctx.arc(0, 0, t.radius, 0, Math.PI * 2);
            if (t.isLookingFront) {
                ctx.fillStyle = '#fcd34d'; ctx.fill(); 
                ctx.fillStyle = 'black'; ctx.fillRect(-12, -8, 6, 6); ctx.fillRect(6, -8, 6, 6); 
                ctx.fillStyle = 'red'; ctx.beginPath(); ctx.arc(0, 10, 6, 0, Math.PI * 2); ctx.fill(); 
                ctx.fillStyle = 'rgba(239, 68, 68, 0.2)'; ctx.beginPath(); ctx.moveTo(0, t.radius); ctx.lineTo(-1000, 2000); ctx.lineTo(1000, 2000); ctx.fill();
            } else { ctx.fillStyle = '#111827'; ctx.fill(); }
        }

        function drawCharacter(char, isMe) {
            ctx.save();
            if (char.displayY === undefined) char.displayY = char.y || 400;
            char.displayY += ((char.y || 400) - char.displayY) * 0.2;
            ctx.translate(char.x, char.displayY);
            if (!char.isAlive) ctx.globalAlpha = 0.4;
            ctx.fillStyle = char.color; ctx.fillRect(-15, 0, 30, 20);
            ctx.beginPath(); ctx.arc(0, -10, char.radius, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#111';
            if (char.lastFoot === 'left') { ctx.fillRect(-15, 20, 12, 12); ctx.fillRect(3, 10, 12, 12); } 
            else { ctx.fillRect(-15, 10, 12, 12); ctx.fillRect(3, 20, 12, 12); }
            if (!char.isAlive) {
                ctx.strokeStyle = 'red'; ctx.lineWidth = 4;
                ctx.beginPath(); ctx.moveTo(-15, -20); ctx.lineTo(15, 10); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(15, -20); ctx.lineTo(-15, 10); ctx.stroke();
            }
            ctx.fillStyle = 'white'; ctx.font = 'bold 12px sans-serif'; ctx.textAlign = 'center';
            ctx.fillText(`${char.displayScore || 0}m`, 0, -35);
            ctx.fillText(char.name, 0, -50);
            if (isMe) { ctx.fillStyle = '#fcd34d'; ctx.fillText('나👇', 0, -65); }
            ctx.restore();
        }

        function draw() {
            if (myPlayer.isAlive) cameraY += (myPlayer.y - canvas.height * 0.7 - cameraY) * 0.1;
            ctx.clearRect(0, 0, canvas.width, canvas.height); 
            ctx.save(); ctx.translate(0, -cameraY);
            ctx.strokeStyle = 'rgba(0,0,0,0.1)'; ctx.lineWidth = 2;
            for (let i = 0; i <= WORLD_START_Y + 200; i += 100) { ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke(); }
            ctx.fillStyle = '#fca5a5'; ctx.fillRect(0, WORLD_FINISH_Y, canvas.width, 20);
            ctx.save(); ctx.translate(tagger.x, tagger.y); drawTagger(tagger); ctx.restore();
            bots.forEach(b => drawCharacter(b, false));
            Object.values(remotePlayers).forEach(p => drawCharacter(p, false));
            drawCharacter(myPlayer, true);
            guardAnims.forEach(anim => {
                anim.x += (anim.targetX - anim.x) * 0.2;
                ctx.save(); ctx.translate(anim.x, anim.y);
                ctx.fillStyle = '#ec4899'; ctx.fillRect(-20, -20, 40, 40);
                ctx.fillStyle = 'red'; ctx.font = 'bold 20px sans-serif'; ctx.textAlign='center'; ctx.fillText('캠핑 금지!', 0, -30); ctx.restore();
            });
            ctx.restore();
            if (!tagger.isLookingFront && tagger.speechBubble) {
                ctx.save();
                let fontSize = Math.min(36, (canvas.width * 0.8) / (tagger.speechBubble.length || 1));
                ctx.font = `900 ${fontSize}px sans-serif`; 
                const textWidth = ctx.measureText(tagger.speechBubble).width;
                ctx.fillStyle = 'white'; ctx.strokeStyle = '#ec4899'; ctx.lineWidth = 4;
                ctx.beginPath(); 
                if(ctx.roundRect) ctx.roundRect(canvas.width/2 - textWidth/2 - 20, 80, textWidth + 40, fontSize * 1.5, 20);
                else ctx.rect(canvas.width/2 - textWidth/2 - 20, 80, textWidth + 40, fontSize * 1.5);
                ctx.fill(); ctx.stroke();
                ctx.fillStyle = 'black'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; 
                ctx.fillText(tagger.speechBubble, canvas.width/2, 80 + fontSize*0.75); 
                ctx.restore();
            } else if (tagger.isLookingFront) {
                ctx.save(); ctx.fillStyle = '#ef4444'; ctx.strokeStyle = 'white'; ctx.lineWidth = 6;
                ctx.font = '900 48px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.strokeText('👀 멈춰!', canvas.width / 2, 110); ctx.fillText('👀 멈춰!', canvas.width / 2, 110); ctx.restore();
            }
        }

        function gameLoop() { updateLogic(); draw(); requestAnimationFrame(gameLoop); }
    </script>
</body>
