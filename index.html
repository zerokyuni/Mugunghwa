<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>무궁화꽃이 피었습니다!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html, body {
            width: 100%; height: 100dvh;
            margin: 0; padding: 0;
            touch-action: none; overflow: hidden;
            background-color: #4ade80;
        }
        #gameCanvas { display: block; width: 100%; height: 100%; }
        .step-btn:active, .step-btn.active { transform: scale(0.95); background-color: #fbbf24; }
    </style>
</head>
<body class="w-full h-full flex flex-col relative select-none font-sans">

    <div class="absolute top-0 left-0 w-full p-4 flex justify-between items-start z-10 pointer-events-none">
        <div class="flex flex-col gap-2">
            <div class="bg-gray-900 bg-opacity-80 text-white px-4 py-2 rounded-full font-bold shadow-md text-sm md:text-base">
                STAGE <span id="stageText" class="text-yellow-400">1</span>
            </div>
            <div id="hostBadge" class="hidden bg-purple-600 bg-opacity-90 text-white px-3 py-1 rounded-full font-bold shadow-md text-xs">
                👑 방장 (Host)
            </div>
        </div>
        <div class="flex flex-col gap-2 items-end">
            <div class="bg-blue-600 text-white px-4 py-2 rounded-full font-bold shadow-md text-sm md:text-base">
                남은 거리: <span id="distText">20</span>m
            </div>
            <div class="bg-gray-900 bg-opacity-80 text-white px-4 py-2 rounded-full font-bold shadow-md text-xs">
                접속: <span id="playerCount">1</span>명
            </div>
        </div>
    </div>

    <canvas id="gameCanvas" class="flex-grow"></canvas>

    <div id="controls" class="h-32 bg-gray-800 flex justify-between items-center p-4 gap-4 z-10 w-full shrink-0 shadow-[0_-4px_10px_rgba(0,0,0,0.3)]">
        <button id="btnLeft" class="step-btn flex-1 h-full bg-yellow-400 rounded-2xl text-2xl font-black text-gray-900 transition-transform">
            왼발 👣
        </button>
        <button id="btnRight" class="step-btn flex-1 h-full bg-yellow-400 rounded-2xl text-2xl font-black text-gray-900 transition-transform">
            오른발 👣
        </button>
    </div>

    <div id="uiOverlay" class="absolute inset-0 bg-black bg-opacity-80 flex flex-col items-center justify-center z-20 transition-opacity">
        <h1 id="uiTitle" class="text-5xl md:text-7xl font-black text-white mb-2 text-center drop-shadow-lg">멀티플레이<br>접속 중...</h1>
        <p id="uiDesc" class="text-white text-lg md:text-xl mb-8 text-center px-6 leading-relaxed">
            서버와 동기화하고 있습니다.<br>잠시만 기다려주세요!
        </p>
        <button id="btnStart" class="hidden bg-green-500 hover:bg-green-400 text-white px-10 py-5 rounded-full text-2xl md:text-3xl font-bold shadow-[0_6px_0_#166534] active:translate-y-2 transition-all animate-pulse">
            게임 난입하기
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ==========================================
        // 발급받으신 Firebase Config 설정 적용!
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyDQ6QT1gRdh0yTm8_yT6j__Bb-VDHwx4xE",
            authDomain: "mugunghwa-game-938ed.firebaseapp.com",
            projectId: "mugunghwa-game-938ed",
            storageBucket: "mugunghwa-game-938ed.firebasestorage.app",
            messagingSenderId: "500124015152",
            appId: "1:500124015152:web:2e24d8ef54d388ce01abf5",
            measurementId: "G-VZHJ59HYBS"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        // Firebase Firestore 경로는 콜론(:)을 허용하지 않으므로 언더바(_)로 치환
        const safeAppId = firebaseConfig.appId.replace(/:/g, '_'); 

        const UI = {
            overlay: document.getElementById('uiOverlay'), title: document.getElementById('uiTitle'),
            desc: document.getElementById('uiDesc'), btnStart: document.getElementById('btnStart'),
            distText: document.getElementById('distText'), stageText: document.getElementById('stageText'),
            playerCount: document.getElementById('playerCount'), hostBadge: document.getElementById('hostBadge')
        };

        let myUid = null;
        let isHost = false;
        let gameState = 'CONNECTING'; 
        let currentStage = 1;
        let targetMeters = 20;
        let WORLD_START_Y = targetMeters * 20;
        const WORLD_FINISH_Y = 0;
        let cameraY = WORLD_START_Y - 500;

        let lastMoveTime = Date.now();
        let myPlayer = { 
            x: 0, y: WORLD_START_Y, radius: 18, stepSize: 10, lastFoot: null, 
            color: '#3b82f6', isAlive: true, hasFinished: false, name: '나', deathReason: '' 
        };
        let remotePlayers = {};
        let bots = [];
        
        // --- 화려하게 부활한 15종의 극악무도 패턴들! ---
        const BASE_PATTERNS = [
            [{t:'무',d:250},{t:'궁',d:250},{t:'화',d:250},{t:' ',d:0},{t:'꽃',d:200},{t:'이',d:200},{t:' ',d:0},{t:'피',d:150},{t:'었',d:150},{t:'습',d:150},{t:'니',d:100},{t:'다',d:100},{t:'!',d:300}], // 0. 기본
            [{t:'무~',d:600},{t:'궁~',d:600},{t:'화~',d:600},{t:' ',d:0},{t:'꽃',d:120},{t:'이',d:120},{t:'폈',d:120},{t:'다',d:120},{t:'!',d:200}], // 1. 느릿느릿
            [{t:'무',d:200},{t:'궁',d:200},{t:'화',d:200},{t:' ',d:0},{t:'꽃~',d:1000},{t:'~이',d:300},{t:' ',d:0},{t:'피',d:150},{t:'었',d:150},{t:'습',d:100},{t:'니',d:100},{t:'닷',d:100},{t:'!',d:200}], // 2. 엇박자
            [{t:'무',d:80},{t:'궁',d:80},{t:'화',d:80},{t:'꽃',d:80},{t:'이',d:80},{t:'피',d:80},{t:'었',d:80},{t:'습',d:80},{t:'니',d:80},{t:'닷',d:80},{t:'!',d:250}], // 3. 랩퍼
            [{t:'무',d:200},{t:'궁',d:200},{t:'화',d:200},{t:' ',d:0},{t:'꽃',d:200},{t:'이',d:200},{t:' ',d:0},{t:'피',d:150},{t:'었',d:150},{t:'습',d:150},{t:'니~',d:600},{t:'다~',d:600},{t:'!',d:200}], // 4. 끝음
            [{t:'무',d:40},{t:'궁',d:40},{t:'화',d:40},{t:'꽃',d:40},{t:'이',d:40},{t:'피',d:40},{t:'었',d:40},{t:'습',d:40},{t:'니',d:40},{t:'다',d:40},{t:'!',d:100}], // 5. 초광속
            [{t:'무',d:150},{t:'궁',d:150},{t:'화',d:150},{t:'...',d:1000},{t:'꽃',d:50},{t:'이',d:50},{t:'피',d:50},{t:'었',d:50},{t:'습',d:50},{t:'니',d:50},{t:'다',d:50},{t:'!',d:150}], // 6. 페이크 정지
            [{t:'무',d:300},{t:'궁',d:50},{t:'화',d:300},{t:'꽃',d:50},{t:'이',d:300},{t:'피',d:50},{t:'었',d:300},{t:'습',d:50},{t:'니',d:300},{t:'다',d:50},{t:'!',d:200}], // 7. 밀당
            [{t:'무궁화 ',d:150},{t:'꽃이 ',d:150},{t:'피었',d:100},{t:'습니다!',d:100}], // 8. 기습
            [{t:'무',d:50},{t:'궁',d:50},{t:'화',d:50},{t:'꽃',d:50},{t:'폈',d:50},{t:'다',d:50},{t:'!',d:150}], // 9. 무궁화꽃폈다!
            [{t:'무',d:60},{t:'궁',d:60},{t:'화',d:60},{t:'꽃',d:60},{t:'핌',d:60},{t:'!',d:120}], // 10. 무궁화꽃핌!
            [{t:'무~~~~',d:900},{t:'궁',d:100},{t:'화',d:100},{t:'꽃 ',d:200},{t:'이~~ ',d:700},{t:'피~ ',d:500},{t:'었~~~ ',d:800},{t:'습',d:100},{t:'니',d:100},{t:'다',d:100},{t:'!',d:200}], // 11. 무한 딜레이
            [{t:'무  ',d:250},{t:'궁',d:100},{t:'화',d:100},{t:'꽃',d:100},{t:'잎 ',d:200},{t:'이',d:100},{t:'피',d:100},{t:'었 ',d:200},{t:'슴',d:100},{t:'다',d:100},{t:'!',d:200}], // 12. 이상한 띄어쓰기
            [{t:'The ',d:200},{t:'hi',d:100},{t:'bis',d:100},{t:'cus ',d:200},{t:'has ',d:200},{t:'bloom',d:150},{t:'ed',d:150},{t:'!',d:250}], // 13. 영어 버전
            [{t:'무',d:150},{t:'궁',d:150},{t:'화',d:150},{t:' ',d:0},{t:'꽃',d:150},{t:'이',d:150},{t:' ',d:0},{t:'피',d:150},{t:'었',d:150},{t:'습',d:150},{t:'니',d:150},{t:'...',d:1500},{t:'다',d:30},{t:'!',d:50}] // 14. 악질 페이크2
        ];

        let tagger = {
            x: 0, y: -80, radius: 28, isLookingFront: false, state: 'SPEAKING',
            speechBubble: "", nextActionTime: 0, phraseIndex: 0, currentPattern: []
        };
        let guardAnim = { active: false, x: 0, y: 0, targetX: 0, alpha: 0 };

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight - document.getElementById('controls').offsetHeight;
            tagger.x = canvas.width / 2;
        });
        window.dispatchEvent(new Event('resize'));

        function getRoomPath() {
            return `rooms/${safeAppId}/squid`;
        }

        // Firebase 익명 로그인
        signInAnonymously(auth).catch((error) => console.error("Auth failed:", error));
        
        onAuthStateChanged(auth, (user) => {
            if (user) {
                myUid = user.uid;
                myPlayer.name = '유저 ' + myUid.substring(0, 4);
                myPlayer.color = ['#3b82f6', '#10b981', '#f59e0b', '#8b5cf6', '#ec4899'][Math.floor(Math.random()*5)];
                setupMultiplayer();
            }
        });

        function setupMultiplayer() {
            const playersRef = collection(db, getRoomPath() + '/players');
            const stateRef = doc(db, getRoomPath(), 'globalState');

            onSnapshot(stateRef, (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    tagger = { ...tagger, ...data.tagger };
                    bots = data.bots || [];
                    currentStage = data.stage || 1;
                    targetMeters = currentStage * 20;
                    WORLD_START_Y = targetMeters * 20;
                    UI.stageText.innerText = currentStage;

                    if (data.status === 'RESET' && gameState === 'PLAYING') {
                        triggerGlobalReset(data.resetReason);
                    }
                }
            }, (error) => console.error(error));

            onSnapshot(playersRef, (snapshot) => {
                const now = Date.now();
                let oldestUid = myUid;
                let oldestTime = now + 999999;
                let activeCount = 0;

                snapshot.forEach(docSnap => {
                    const data = docSnap.data();
                    const uid = docSnap.id;
                    
                    if (data.joinedAt < oldestTime) {
                        oldestTime = data.joinedAt;
                        oldestUid = uid;
                    }

                    if (uid !== myUid) {
                        if (!remotePlayers[uid]) remotePlayers[uid] = { ...data, displayY: data.y };
                        remotePlayers[uid] = { ...remotePlayers[uid], ...data };
                        activeCount++;
                    }
                });

                UI.playerCount.innerText = activeCount + 1;
                
                if (oldestUid === myUid && !isHost) {
                    isHost = true;
                    UI.hostBadge.classList.remove('hidden');
                    if (bots.length === 0) initBots();
                } else if (oldestUid !== myUid && isHost) {
                    isHost = false;
                    UI.hostBadge.classList.add('hidden');
                }

                if (gameState === 'CONNECTING') {
                    UI.title.innerText = "준비 완료!";
                    UI.desc.innerHTML = `서버 연결 성공!<br>현재 스테이지: ${currentStage}`;
                    UI.btnStart.classList.remove('hidden');
                }
            });

            setDoc(doc(playersRef, myUid), { ...myPlayer, joinedAt: Date.now(), lastActive: Date.now() });
            setInterval(syncLocalPlayer, 200);
            setInterval(syncHostState, 200);
            requestAnimationFrame(gameLoop);
        }

        function initBots() {
            const speedMod = Math.max(0, (currentStage - 1) * 16);
            const reactMod = Math.max(0, (currentStage - 1) * 12);
            bots = [
                { id: 'bot1', y: WORLD_START_Y, stepSize: 12, lastFoot: 'left', color: '#ef4444', isAlive: true, hasFinished: false, name: '[BOT] 다혈질', caution: 0.80, nextStepTime: 0, reactionTime: Math.max(35, 120 - reactMod) },
                { id: 'bot2', y: WORLD_START_Y, stepSize: 11, lastFoot: 'left', color: '#a855f7', isAlive: true, hasFinished: false, name: '[BOT] 무난이', caution: 0.92, nextStepTime: 0, reactionTime: Math.max(25, 80 - reactMod) },
                { id: 'bot3', y: WORLD_START_Y, stepSize: 10, lastFoot: 'left', color: '#f97316', isAlive: true, hasFinished: false, name: '[BOT] 신중이', caution: 0.99, nextStepTime: 0, reactionTime: Math.max(15, 50 - reactMod) }
            ];
            bots.forEach(b => { b.displayY = b.y; });
        }

        function syncLocalPlayer() {
            if (!myUid || gameState !== 'PLAYING') return;
            const ref = doc(db, getRoomPath() + '/players', myUid);
            updateDoc(ref, { 
                y: myPlayer.y, isAlive: myPlayer.isAlive, hasFinished: myPlayer.hasFinished, 
                lastFoot: myPlayer.lastFoot, deathReason: myPlayer.deathReason, lastActive: Date.now()
            }).catch(() => {});
        }

        function syncHostState() {
            if (!isHost || gameState !== 'PLAYING') return;
            checkRoundProgression();
            setDoc(doc(db, getRoomPath(), 'globalState'), {
                stage: currentStage, status: gameState,
                tagger: { isLookingFront: tagger.isLookingFront, speechBubble: tagger.speechBubble },
                bots: bots.map(b => ({ id: b.id, y: b.y, lastFoot: b.lastFoot, isAlive: b.isAlive, hasFinished: b.hasFinished, color: b.color, name: b.name }))
            }, { merge: true }).catch(() => {});
        }

        function checkRoundProgression() {
            let activeRunners = 0; let clearCount = 0;
            const check = (p) => { if (p.isAlive && !p.hasFinished) activeRunners++; if (p.hasFinished) clearCount++; };
            bots.forEach(check); Object.values(remotePlayers).concat([myPlayer]).forEach(check);

            if (activeRunners === 0 && gameState === 'PLAYING') {
                gameState = 'RESET_PENDING';
                let nextStage = clearCount > 0 ? currentStage + 1 : 1;
                setTimeout(() => {
                    currentStage = nextStage;
                    setDoc(doc(db, getRoomPath(), 'globalState'), { status: 'RESET', stage: currentStage, resetReason: clearCount > 0 ? 'CLEARED' : 'ALL_DEAD' }, { merge: true });
                }, 3000);
            }
        }

        function triggerGlobalReset(reason) {
            gameState = 'ENDED';
            UI.overlay.style.display = 'flex';
            if (reason === 'CLEARED') {
                UI.title.innerHTML = "라운드 종료!";
                UI.title.className = "text-5xl font-black text-yellow-400 mb-2 text-center";
                UI.desc.innerHTML = `누군가 결승선에 도착했습니다!<br>생존자 모두 다음 라운드로 진출합니다.<br><span class="text-xs">잠시 후 재시작됩니다...</span>`;
            } else {
                UI.title.innerHTML = "전멸!";
                UI.title.className = "text-6xl font-black text-red-500 mb-2 text-center";
                UI.desc.innerHTML = `모든 참가자가 탈락했습니다.<br>STAGE 1로 강등됩니다.<br><span class="text-xs">잠시 후 재시작됩니다...</span>`;
            }
            UI.btnStart.classList.add('hidden');
            setTimeout(() => {
                UI.btnStart.innerText = "계속 달리기";
                UI.btnStart.classList.remove('hidden');
            }, 3000);
        }

        UI.btnStart.onclick = startGame;
        function startGame() {
            gameState = 'PLAYING';
            UI.overlay.style.display = 'none';
            targetMeters = currentStage * 20;
            WORLD_START_Y = targetMeters * 20;
            myPlayer.y = WORLD_START_Y; myPlayer.isAlive = true; myPlayer.hasFinished = false; myPlayer.deathReason = '';
            lastMoveTime = Date.now(); cameraY = WORLD_START_Y - 500;
            
            if (isHost) {
                initBots();
                tagger.nextActionTime = Date.now() + 1000; tagger.state = 'SPEAKING';
                
                // 첫 시작 시 패턴과 속도 조합 설정 로직 (호스트)
                let speedMultiplier = Math.max(0.4, 1.0 - (currentStage - 1) * 0.08);
                let rawPattern = BASE_PATTERNS[0];
                tagger.currentPattern = rawPattern.map(p => ({ t: p.t, d: p.d * speedMultiplier }));
                tagger.phraseIndex = 0;
            }
            syncLocalPlayer();
        }

        function movePlayer(foot) {
            if (gameState !== 'PLAYING' || !myPlayer.isAlive || myPlayer.hasFinished) return;
            lastMoveTime = Date.now(); // 캠핑 방지 리셋

            if (tagger.isLookingFront) { die('moved'); return; }

            if (myPlayer.lastFoot !== foot) {
                myPlayer.y -= myPlayer.stepSize; myPlayer.lastFoot = foot;
                UI.distText.innerText = Math.max(0, Math.floor(myPlayer.y / 20));
                if (myPlayer.y <= WORLD_FINISH_Y) { myPlayer.hasFinished = true; myPlayer.y = WORLD_FINISH_Y - 30; }
                syncLocalPlayer();
            }
        }

        function die(reason) {
            myPlayer.isAlive = false; myPlayer.deathReason = reason;
            if (reason === 'camp') {
                guardAnim = { active: true, x: canvas.width + 100, y: myPlayer.y, targetX: myPlayer.x, alpha: 1 };
                myPlayer.x += 40; 
            }
            syncLocalPlayer();
        }

        const addInput = (el, foot) => {
            const handler = (e) => { e.preventDefault(); movePlayer(foot); el.classList.add('active'); setTimeout(()=>el.classList.remove('active'),100); };
            el.addEventListener('touchstart', handler, {passive: false}); el.addEventListener('mousedown', handler);
        };
        addInput(document.getElementById('btnLeft'), 'left'); addInput(document.getElementById('btnRight'), 'right');
        
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') movePlayer('left');
            if (e.key === 'ArrowRight') movePlayer('right');
        });

        function updateLogic() {
            const now = Date.now();

            if (gameState === 'PLAYING' && myPlayer.isAlive && !myPlayer.hasFinished) {
                if (now - lastMoveTime > 5000 && tagger.isLookingFront) die('camp'); // 존버 숙청
            }

            if (isHost && gameState === 'PLAYING') {
                if (now > tagger.nextActionTime) {
                    if (tagger.state === 'SPEAKING') {
                        tagger.speechBubble = tagger.currentPattern.slice(0, tagger.phraseIndex + 1).map(p => p.t).join('');
                        let currentDelay = tagger.currentPattern[tagger.phraseIndex].d;
                        tagger.phraseIndex++;

                        if (tagger.phraseIndex >= tagger.currentPattern.length) {
                            tagger.state = 'LOOKING'; tagger.isLookingFront = true;
                            let minLook = Math.max(200, 700 - currentStage * 50);
                            tagger.nextActionTime = now + minLook + Math.random() * 600;
                        } else {
                            tagger.nextActionTime = now + currentDelay;
                        }
                    } else if (tagger.state === 'LOOKING') {
                        tagger.state = 'SPEAKING'; tagger.isLookingFront = false;
                        tagger.phraseIndex = 0; tagger.speechBubble = "";
                        
                        // 스테이지 비례 패턴 해금 및 속도 증가
                        let maxPatternIndex = Math.min(BASE_PATTERNS.length, 2 + currentStage * 2);
                        let speedMultiplier = Math.max(0.4, 1.0 - (currentStage - 1) * 0.08);
                        let rawPattern = BASE_PATTERNS[Math.floor(Math.random() * maxPatternIndex)];
                        tagger.currentPattern = rawPattern.map(p => ({ t: p.t, d: p.d * speedMultiplier }));
                        tagger.nextActionTime = now + 400;
                    }
                }

                // 봇 지능 업데이트 (페이크 낚임 로직 포함)
                bots.forEach(bot => {
                    if (!bot.isAlive || bot.hasFinished) return;
                    let progress = tagger.phraseIndex / Math.max(1, tagger.currentPattern.length);
                    let startCautionProgress = tagger.currentPattern.length < 8 ? 0.3 : 0.45;
                    
                    let currentDelay = 0;
                    if (tagger.phraseIndex > 0) currentDelay = tagger.currentPattern[tagger.phraseIndex - 1].d;

                    if (!tagger.isLookingFront) {
                        if (now > bot.nextStepTime) {
                            let shouldStop = false;
                            
                            // 대사가 진행 중일 때 눈치 보기 시작
                            if (tagger.state === 'SPEAKING' && progress > startCautionProgress) {
                                if (Math.random() < bot.caution) shouldStop = true;
                            }
                            
                            // ❗ 페이크 함정 로직 (대사가 800ms 이상 멈춰있으면 속아서 뛸 수 있음)
                            if (shouldStop && currentDelay > 800) {
                                if (Math.random() > bot.caution + 0.1) shouldStop = false; 
                            }

                            if (shouldStop) {
                                bot.nextStepTime = now + 100;
                            } else {
                                bot.y -= bot.stepSize; bot.lastFoot = bot.lastFoot === 'left' ? 'right' : 'left';
                                bot.nextStepTime = now + bot.stepInterval + (Math.random() * 40 - 20);
                                bot.lastMoveTime = now;
                                if (bot.y <= WORLD_FINISH_Y) bot.hasFinished = true;
                            }
                        }
                    } else {
                        if (now - bot.lastMoveTime < 100) bot.isAlive = false;
                    }
                });
            }

            let slotIndex = 1;
            const keys = Object.keys(remotePlayers);
            const slotWidth = canvas.width / (keys.length + bots.length + 2);
            bots.forEach(b => { b.x = slotWidth * slotIndex++; });
            myPlayer.x = slotWidth * slotIndex++;
            keys.forEach(k => { remotePlayers[k].x = slotWidth * slotIndex++; });
        }

        function drawTagger(t) {
            ctx.fillStyle = '#ec4899'; ctx.beginPath(); ctx.arc(0, 20, 20, Math.PI, 0); ctx.fill(); 
            ctx.beginPath(); ctx.arc(0, 0, t.radius, 0, Math.PI * 2);
            if (t.isLookingFront) {
                ctx.fillStyle = '#fcd34d'; ctx.fill(); 
                ctx.fillStyle = 'black'; ctx.fillRect(-12, -8, 6, 6); ctx.fillRect(6, -8, 6, 6); 
                ctx.fillStyle = 'red'; ctx.beginPath(); ctx.arc(0, 10, 6, 0, Math.PI * 2); ctx.fill(); 
                ctx.fillStyle = 'rgba(239, 68, 68, 0.3)'; ctx.beginPath(); ctx.moveTo(0, t.radius); ctx.lineTo(-1000, 2000); ctx.lineTo(1000, 2000); ctx.fill();
            } else {
                ctx.fillStyle = '#111827'; ctx.fill(); 
            }
        }

        function drawCharacter(char) {
            ctx.save();
            if (char.displayY === undefined) char.displayY = char.y;
            char.displayY += (char.y - char.displayY) * 0.3;
            
            ctx.translate(char.x, char.displayY);
            if (!char.isAlive) ctx.globalAlpha = 0.4;
            ctx.fillStyle = char.color; ctx.fillRect(-15, 0, 30, 20);
            ctx.beginPath(); ctx.arc(0, -10, char.radius, 0, Math.PI * 2); ctx.fill();

            ctx.fillStyle = '#111';
            if (char.lastFoot === 'left') { ctx.fillRect(-15, 20, 12, 12); ctx.fillRect(3, 10, 12, 12); } 
            else { ctx.fillRect(-15, 10, 12, 12); ctx.fillRect(3, 20, 12, 12); }

            if (!char.isAlive) {
                ctx.strokeStyle = 'red'; ctx.lineWidth = 6;
                ctx.beginPath(); ctx.moveTo(-20, -30); ctx.lineTo(20, 10); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(20, -30); ctx.lineTo(-20, 10); ctx.stroke();
            }
            
            ctx.fillStyle = 'white'; ctx.font = 'bold 12px sans-serif'; ctx.textAlign = 'center';
            ctx.fillText(char.name, 0, -35); ctx.restore();
        }

        function draw() {
            if (myPlayer.isAlive && !myPlayer.hasFinished) cameraY += (myPlayer.y - canvas.height * 0.7 - cameraY) * 0.1;
            if (cameraY < -150) cameraY = -150;

            ctx.clearRect(0, 0, canvas.width, canvas.height); ctx.save(); ctx.translate(0, -cameraY);

            ctx.strokeStyle = 'rgba(0,0,0,0.1)'; ctx.lineWidth = 2;
            for (let i = 0; i <= WORLD_START_Y; i += 100) { ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke(); }
            ctx.fillStyle = '#fca5a5'; ctx.fillRect(0, WORLD_FINISH_Y, canvas.width, 20);
            ctx.fillStyle = 'white'; ctx.fillRect(0, WORLD_START_Y + 20, canvas.width, 10);

            ctx.save(); ctx.translate(tagger.x, tagger.y); drawTagger(tagger); ctx.restore();

            let allChars = [...bots, ...Object.values(remotePlayers), myPlayer].sort((a, b) => a.y - b.y);
            allChars.forEach(drawCharacter);

            if (guardAnim.active) {
                guardAnim.x += (guardAnim.targetX - guardAnim.x) * 0.3;
                ctx.save(); ctx.translate(guardAnim.x, guardAnim.y);
                ctx.fillStyle = '#ec4899'; ctx.fillRect(-20, -20, 40, 40);
                ctx.fillStyle = 'white'; ctx.font = 'bold 20px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline='middle'; ctx.fillText('■', 0, 0);
                ctx.fillStyle = 'red'; ctx.font = 'bold 24px sans-serif'; ctx.fillText('캠핑 금지!', 0, -40); ctx.restore();
                if (Math.abs(guardAnim.x - guardAnim.targetX) < 5) { guardAnim.alpha -= 0.05; if (guardAnim.alpha <= 0) guardAnim.active = false; }
            }
            ctx.restore();

            if (!tagger.isLookingFront && tagger.speechBubble) {
                ctx.save();
                let fontSize = Math.min(36, (canvas.width * 0.8) / (tagger.speechBubble.length || 1));
                ctx.font = `900 ${fontSize}px sans-serif`; const textWidth = ctx.measureText(tagger.speechBubble).width;
                ctx.fillStyle = 'white'; ctx.strokeStyle = '#ec4899'; ctx.lineWidth = 4;
                ctx.beginPath(); ctx.roundRect(canvas.width/2 - textWidth/2 - 20, 80, textWidth + 40, fontSize * 1.5, 20); ctx.fill(); ctx.stroke();
                ctx.fillStyle = 'black'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText(tagger.speechBubble, canvas.width/2, 80 + fontSize*0.75); ctx.restore();
            } else if (tagger.isLookingFront) {
                ctx.save(); ctx.fillStyle = '#ef4444'; ctx.strokeStyle = 'white'; ctx.lineWidth = 6;
                ctx.font = '900 48px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.strokeText('👀 멈춰!', canvas.width / 2, 110); ctx.fillText('👀 멈춰!', canvas.width / 2, 110); ctx.restore();
            }
        }

        function gameLoop() { updateLogic(); draw(); requestAnimationFrame(gameLoop); }

    </script>
</body>
