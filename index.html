<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>무궁화꽃이 피었습니다!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html, body {
            width: 100%; height: 100dvh;
            margin: 0; padding: 0;
            touch-action: none; overflow: hidden;
            background-color: #4ade80;
        }
        #gameCanvas { display: block; width: 100%; height: 100%; }
        .step-btn { transition: transform 0.05s, background-color 0.1s; }
        .step-btn:active, .step-btn.active { transform: scale(0.92); background-color: #f59e0b; box-shadow: none !important; margin-top: 4px; }
    </style>
</head>
<body class="w-full h-full flex flex-col relative select-none font-sans">

    <div class="absolute top-0 left-0 w-full p-4 flex justify-between items-start z-10 pointer-events-none">
        <div class="flex flex-col gap-2">
            <div class="bg-gray-900 bg-opacity-80 text-white px-4 py-2 rounded-full font-bold shadow-md text-sm md:text-base">
                STAGE <span id="stageText" class="text-yellow-400">1</span>
            </div>
        </div>
        <div class="flex flex-col gap-2 items-end">
            <div class="bg-blue-600 text-white px-4 py-2 rounded-full font-bold shadow-md text-sm md:text-base">
                남은 거리: <span id="distText">20</span>m
            </div>
            <div class="bg-gray-900 bg-opacity-80 text-white px-4 py-2 rounded-full font-bold shadow-md text-xs">
                접속: <span id="playerCount">1</span>명
            </div>
        </div>
    </div>

    <canvas id="gameCanvas" class="flex-grow"></canvas>

    <div id="controls" class="h-32 bg-gray-800 flex justify-between items-center p-4 gap-4 z-10 w-full shrink-0 shadow-[0_-4px_10px_rgba(0,0,0,0.3)]">
        <button id="btnLeft" class="step-btn flex-1 h-full bg-yellow-400 rounded-2xl text-2xl font-black text-gray-900 shadow-[0_8px_0_#b45309]">
            왼발 👣 (←)
        </button>
        <button id="btnRight" class="step-btn flex-1 h-full bg-yellow-400 rounded-2xl text-2xl font-black text-gray-900 shadow-[0_8px_0_#b45309]">
            오른발 👣 (→)
        </button>
    </div>

    <div id="uiOverlay" class="absolute inset-0 bg-black bg-opacity-80 flex flex-col items-center justify-center z-20 transition-opacity">
        <h1 id="uiTitle" class="text-5xl md:text-7xl font-black text-white mb-2 text-center drop-shadow-lg">접속 중...</h1>
        <p id="uiDesc" class="text-white text-lg md:text-xl mb-8 text-center px-6 leading-relaxed">
            Firebase 서버와 동기화하고 있습니다.<br>잠시만 기다려주세요!
        </p>
        <button id="btnStart" class="hidden bg-green-500 hover:bg-green-400 text-white px-10 py-5 rounded-full text-2xl md:text-3xl font-bold shadow-[0_6px_0_#166534] active:translate-y-2 transition-all animate-pulse">
            게임 난입하기
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDQ6QT1gRdh0yTm8_yT6j__Bb-VDHwx4xE",
            authDomain: "mugunghwa-game-938ed.firebaseapp.com",
            projectId: "mugunghwa-game-938ed",
            storageBucket: "mugunghwa-game-938ed.firebasestorage.app",
            messagingSenderId: "500124015152",
            appId: "1:500124015152:web:2e24d8ef54d388ce01abf5",
            measurementId: "G-VZHJ59HYBS"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const safeAppId = firebaseConfig.appId.replace(/[^a-zA-Z0-9]/g, '_'); 

        const UI = {
            overlay: document.getElementById('uiOverlay'), title: document.getElementById('uiTitle'),
            desc: document.getElementById('uiDesc'), btnStart: document.getElementById('btnStart'),
            distText: document.getElementById('distText'), stageText: document.getElementById('stageText'),
            playerCount: document.getElementById('playerCount')
        };

        let myUid = null;
        let isHost = false;
        let forcedHostUid = null; 
        let oldestUid = null;     

        let gameState = 'CONNECTING'; 
        let currentStage = 1;
        let targetMeters = 20;
        let WORLD_START_Y = targetMeters * 20;
        const WORLD_FINISH_Y = 0;
        let cameraY = WORLD_START_Y - 500;
        
        let roundStartTime = 0; 

        let lastMoveTime = Date.now();
        let myPlayer = { 
            x: 0, y: WORLD_START_Y, radius: 18, stepSize: 10, lastFoot: null, 
            color: '#3b82f6', isAlive: true, hasFinished: false, name: '나', deathReason: '',
            totalMeters: 0, currentMeters: 0, displayScore: 0
        };
        let remotePlayers = {};
        let bots = [];
        
        const BASE_PATTERNS = [
            [{t:'무',d:250},{t:'궁',d:250},{t:'화',d:250},{t:' ',d:0},{t:'꽃',d:200},{t:'이',d:200},{t:' ',d:0},{t:'피',d:150},{t:'었',d:150},{t:'습',d:150},{t:'니',d:100},{t:'다',d:100},{t:'!',d:300}], 
            [{t:'무~',d:600},{t:'궁~',d:600},{t:'화~',d:600},{t:' ',d:0},{t:'꽃',d:120},{t:'이',d:120},{t:'폈',d:120},{t:'다',d:120},{t:'!',d:200}], 
            [{t:'무',d:200},{t:'궁',d:200},{t:'화',d:200},{t:' ',d:0},{t:'꽃~',d:1000},{t:'~이',d:300},{t:' ',d:0},{t:'피',d:150},{t:'었',d:150},{t:'습',d:100},{t:'니',d:100},{t:'닷',d:100},{t:'!',d:200}], 
            [{t:'무',d:80},{t:'궁',d:80},{t:'화',d:80},{t:'꽃',d:80},{t:'이',d:80},{t:'피',d:80},{t:'었',d:80},{t:'습',d:80},{t:'니',d:80},{t:'닷',d:80},{t:'!',d:250}], 
            [{t:'무',d:200},{t:'궁',d:200},{t:'화',d:200},{t:' ',d:0},{t:'꽃',d:200},{t:'이',d:200},{t:' ',d:0},{t:'피',d:150},{t:'었',d:150},{t:'습',d:150},{t:'니~',d:600},{t:'다~',d:600},{t:'!',d:200}], 
            [{t:'무',d:40},{t:'궁',d:40},{t:'화',d:40},{t:'꽃',d:40},{t:'이',d:40},{t:'피',d:40},{t:'었',d:40},{t:'습',d:40},{t:'니',d:40},{t:'다',d:40},{t:'!',d:100}], 
            [{t:'무',d:150},{t:'궁',d:150},{t:'화',d:150},{t:'...',d:1000},{t:'꽃',d:50},{t:'이',d:50},{t:'피',d:50},{t:'었',d:50},{t:'습',d:50},{t:'니',d:50},{t:'다',d:50},{t:'!',d:150}], 
            [{t:'무',d:300},{t:'궁',d:50},{t:'화',d:300},{t:'꽃',d:50},{t:'이',d:300},{t:'피',d:50},{t:'었',d:300},{t:'습',d:50},{t:'니',d:300},{t:'다',d:50},{t:'!',d:200}], 
            [{t:'무궁화 ',d:150},{t:'꽃이 ',d:150},{t:'피었',d:100},{t:'습니다!',d:100}], 
            [{t:'무',d:50},{t:'궁',d:50},{t:'화',d:50},{t:'꽃',d:50},{t:'폈',d:50},{t:'다',d:50},{t:'!',d:150}], 
            [{t:'무',d:60},{t:'궁',d:60},{t:'화',d:60},{t:'꽃',d:60},{t:'핌',d:60},{t:'!',d:120}], 
            [{t:'무~~~~',d:900},{t:'궁',d:100},{t:'화',d:100},{t:'꽃 ',d:200},{t:'이~~ ',d:700},{t:'피~ ',d:500},{t:'었~~~ ',d:800},{t:'습',d:100},{t:'니',d:100},{t:'다',d:100},{t:'!',d:200}], 
            [{t:'무  ',d:250},{t:'궁',d:100},{t:'화',d:100},{t:'꽃',d:100},{t:'잎 ',d:200},{t:'이',d:100},{t:'피',d:100},{t:'었 ',d:200},{t:'슴',d:100},{t:'다',d:100},{t:'!',d:200}], 
            [{t:'The ',d:200},{t:'hi',d:100},{t:'bis',d:100},{t:'cus ',d:200},{t:'has ',d:200},{t:'bloom',d:150},{t:'ed',d:150},{t:'!',d:250}], 
            [{t:'무',d:150},{t:'궁',d:150},{t:'화',d:150},{t:' ',d:0},{t:'꽃',d:150},{t:'이',d:150},{t:' ',d:0},{t:'피',d:150},{t:'었',d:150},{t:'습',d:150},{t:'니',d:150},{t:'...',d:1500},{t:'다',d:30},{t:'!',d:50}]
        ];

        let tagger = {
            x: 0, y: -80, radius: 28, isLookingFront: false, state: 'SPEAKING',
            speechBubble: "", nextActionTime: 0, phraseIndex: 0, currentPattern: []
        };
        let guardAnims = []; 

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight - document.getElementById('controls').offsetHeight;
            tagger.x = canvas.width / 2;
        });
        window.dispatchEvent(new Event('resize'));

        function getPlayersRef() { return collection(db, `artifacts/${safeAppId}/public/data/squid_players`); }
        function getStateRef() { return doc(db, `artifacts/${safeAppId}/public/data/squid_state`, 'globalState'); }

        UI.desc.innerText = "1단계: Firebase 인증 진행 중...";
        signInAnonymously(auth).catch((error) => {
            UI.title.innerHTML = "<span class='text-red-500'>접속 에러</span>";
            UI.desc.innerHTML = `<b class='text-red-300'>인증에 실패했습니다.</b><br><span class="text-sm">${error.message}</span>`;
        });
        
        onAuthStateChanged(auth, (user) => {
            if (user) {
                myUid = user.uid;
                myPlayer.name = '유저 ' + myUid.substring(0, 4);
                myPlayer.color = ['#3b82f6', '#10b981', '#f59e0b', '#8b5cf6', '#ec4899'][Math.floor(Math.random()*5)];
                UI.desc.innerText = "2단계: 데이터베이스 접속 중...";
                setupMultiplayer();
            }
        });

        function resolveHost() {
            if (!myUid) return;
            let currentHost = forcedHostUid;
            let hostIsOnline = false;

            if (currentHost === myUid) hostIsOnline = true;
            else if (currentHost && remotePlayers[currentHost]) hostIsOnline = true;

            if (!currentHost || !hostIsOnline) {
                currentHost = oldestUid || myUid;
            }

            if (currentHost === myUid && !isHost) {
                isHost = true; 
                if (bots.length === 0) initBots();
            } else if (currentHost !== myUid && isHost) {
                isHost = false; 
            }
        }

        function setupMultiplayer() {
            const playersRef = getPlayersRef();
            const stateRef = getStateRef();

            onSnapshot(stateRef, (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    tagger = { ...tagger, ...data.tagger };
                    bots = data.bots || [];
                    currentStage = data.stage || 1;
                    targetMeters = currentStage * 20;
                    WORLD_START_Y = targetMeters * 20;
                    UI.stageText.innerText = currentStage;
                    
                    if (data.forceHost) forcedHostUid = data.forceHost;
                    resolveHost();

                    if (data.status === 'CLEARED_PENDING' && gameState !== 'ENDED') {
                        triggerGlobalReset('CLEARED');
                    } else if (data.status === 'HUMANS_DEAD' && gameState !== 'ENDED') {
                        triggerGlobalReset('ALL_DEAD_MANUAL');
                    } else if (data.status === 'RESET' && gameState !== 'PLAYING') {
                        startGame(); 
                    }
                }
            }, (error) => {
                UI.title.innerHTML = "<span class='text-red-500'>DB 에러</span>";
                UI.desc.innerHTML = `<b class='text-red-300'>데이터베이스 권한이 없습니다.</b><br><span class="text-sm">${error.message}</span>`;
            });

            onSnapshot(playersRef, (snapshot) => {
                const now = Date.now();
                oldestUid = myUid;
                let oldestTime = now + 999999;
                let activeCount = 0;
                const currentUids = [];

                snapshot.forEach(docSnap => {
                    const data = docSnap.data();
                    const uid = docSnap.id;
                    currentUids.push(uid);
                    
                    if (uid === myUid) {
                        if (myPlayer.isAlive && data.isAlive === false) {
                            myPlayer.isAlive = false;
                            myPlayer.deathReason = data.deathReason;
                            if (data.deathReason === 'camp') {
                                guardAnims.push({ active: true, x: canvas.width + 100, y: myPlayer.y, targetX: myPlayer.x, alpha: 1 });
                                myPlayer.x += 40; 
                            }
                        }
                    }

                    if (data.joinedAt < oldestTime) { oldestTime = data.joinedAt; oldestUid = uid; }

                    if (uid !== myUid) {
                        if (!remotePlayers[uid]) remotePlayers[uid] = { ...data, displayY: data.y };
                        
                        if (remotePlayers[uid].isAlive && data.isAlive === false && data.deathReason === 'camp') {
                            guardAnims.push({ active: true, x: canvas.width + 100, y: data.y, targetX: data.x, alpha: 1 });
                        }
                        
                        // ❗ 버그 수정: localLastUpdate를 무조건 덮어쓰지 않고, 데이터에 명시된 lastActive를 그대로 유지합니다.
                        remotePlayers[uid] = { ...remotePlayers[uid], ...data };
                        activeCount++;
                    }
                });

                Object.keys(remotePlayers).forEach(uid => {
                    if (!currentUids.includes(uid)) delete remotePlayers[uid];
                });

                UI.playerCount.innerText = activeCount + 1;
                resolveHost(); 

                if (gameState === 'CONNECTING') {
                    UI.title.innerText = "준비 완료!";
                    UI.desc.innerHTML = `서버 연결 성공!<br>현재 스테이지: ${currentStage}`;
                    UI.btnStart.classList.remove('hidden');
                }
            }, (error) => console.error(error));

            setDoc(doc(playersRef, myUid), { ...myPlayer, joinedAt: Date.now(), lastActive: Date.now() }).catch(e => console.error(e));
            setInterval(syncLocalPlayer, 200);
            setInterval(syncHostState, 200);
            requestAnimationFrame(gameLoop);
        }

        function initBots() {
            const speedMod = Math.max(0, (currentStage - 1) * 16);
            const reactMod = Math.max(0, (currentStage - 1) * 12);
            bots = [
                { id: 'bot1', y: WORLD_START_Y, stepSize: 12, stepInterval: Math.max(45, 100 - speedMod), lastFoot: 'left', color: '#ef4444', isAlive: true, hasFinished: false, name: '[BOT] 다혈질', caution: 0.80, nextStepTime: 0, reactionTime: Math.max(35, 120 - reactMod), totalMeters: 0, currentMeters: 0, displayScore: 0 },
                { id: 'bot2', y: WORLD_START_Y, stepSize: 11, stepInterval: Math.max(65, 130 - speedMod), lastFoot: 'left', color: '#a855f7', isAlive: true, hasFinished: false, name: '[BOT] 무난이', caution: 0.92, nextStepTime: 0, reactionTime: Math.max(25, 80 - reactMod), totalMeters: 0, currentMeters: 0, displayScore: 0 },
                { id: 'bot3', y: WORLD_START_Y, stepSize: 10, stepInterval: Math.max(85, 160 - speedMod), lastFoot: 'left', color: '#f97316', isAlive: true, hasFinished: false, name: '[BOT] 신중이', caution: 0.99, nextStepTime: 0, reactionTime: Math.max(15, 50 - reactMod), totalMeters: 0, currentMeters: 0, displayScore: 0 }
            ];
            bots.forEach(b => { b.displayY = b.y; });
        }

        function syncLocalPlayer() {
            if (!myUid) return; // ❗ 게임 플레이 중이 아니더라도 계속 살아있다는 신호(heartbeat)를 보냅니다.
            setDoc(doc(getPlayersRef(), myUid), { 
                y: myPlayer.y, isAlive: myPlayer.isAlive, hasFinished: myPlayer.hasFinished, 
                lastFoot: myPlayer.lastFoot, deathReason: myPlayer.deathReason, lastMoveTime: lastMoveTime, lastActive: Date.now(),
                displayScore: myPlayer.displayScore, color: myPlayer.color, name: myPlayer.name
            }, { merge: true }).catch(() => {});
        }

        function syncHostState() {
            if (!isHost || gameState !== 'PLAYING') return;
            checkRoundProgression();
            setDoc(getStateRef(), {
                stage: currentStage, status: gameState,
                tagger: { isLookingFront: tagger.isLookingFront, speechBubble: tagger.speechBubble },
                bots: bots.map(b => ({ id: b.id, y: b.y, stepSize: b.stepSize, stepInterval: b.stepInterval, lastFoot: b.lastFoot, isAlive: b.isAlive, hasFinished: b.hasFinished, color: b.color, name: b.name, caution: b.caution, reactionTime: b.reactionTime, nextStepTime: b.nextStepTime, lastMoveTime: b.lastMoveTime, displayScore: b.displayScore }))
            }, { merge: true }).catch(() => {});
        }

        function checkRoundProgression() {
            if (Date.now() - roundStartTime < 3000) return;

            let humanRunners = 0; let humanClear = 0;
            const humans = Object.values(remotePlayers).concat([myPlayer]);

            humans.forEach(p => {
                if (p.isAlive && !p.hasFinished) humanRunners++;
                if (p.hasFinished) humanClear++;
            });

            if (gameState === 'PLAYING') {
                if (humanClear > 0) {
                    gameState = 'RESET_PENDING';
                    setDoc(getStateRef(), { status: 'CLEARED_PENDING', stage: currentStage }, { merge: true });
                    setTimeout(() => {
                        currentStage++;
                        setDoc(getStateRef(), { status: 'RESET', stage: currentStage }, { merge: true });
                    }, 3000);
                } else if (humanRunners === 0) {
                    gameState = 'RESET_PENDING';
                    setDoc(getStateRef(), { status: 'HUMANS_DEAD', stage: 1 }, { merge: true });
                }
            }
        }

        function triggerGlobalReset(reason) {
            gameState = 'ENDED'; UI.overlay.style.display = 'flex';
            if (reason === 'CLEARED') {
                UI.title.innerHTML = "라운드 종료!"; UI.title.className = "text-5xl font-black text-yellow-400 mb-2 text-center";
                UI.desc.innerHTML = `누군가 결승선에 도착했습니다!<br>생존자 모두 다음 라운드로 진출합니다.<br><span class="text-xs">잠시 후 자동 재시작됩니다...</span>`;
                UI.btnStart.classList.add('hidden');
            } else if (reason === 'ALL_DEAD_MANUAL') {
                UI.title.innerHTML = "인간 전멸!"; UI.title.className = "text-6xl font-black text-red-500 mb-2 text-center";
                UI.desc.innerHTML = `모든 플레이어가 탈락했습니다.<br><b>[다시 시작]</b>을 눌러 재도전하세요!`;
                UI.btnStart.innerText = "다시 시작";
                UI.btnStart.classList.remove('hidden');
                UI.btnStart.onclick = claimHostAndRestart; 
            }
        }

        function claimHostAndRestart() {
            UI.btnStart.classList.add('hidden');
            UI.desc.innerHTML = "게임을 초기화합니다...";
            setDoc(getStateRef(), { status: 'RESET', stage: 1, forceHost: myUid }, { merge: true });
        }

        UI.btnStart.onclick = claimHostAndRestart; 

        function startGame() {
            gameState = 'PLAYING'; UI.overlay.style.display = 'none';
            roundStartTime = Date.now(); 
            
            // ❗ 1라운드 시작 시 점수 완벽 초기화, 그 외에는 누적
            if (currentStage === 1) {
                myPlayer.totalMeters = 0;
                myPlayer.currentMeters = 0;
                myPlayer.displayScore = 0;
            } else {
                myPlayer.totalMeters += (myPlayer.currentMeters || 0);
                myPlayer.currentMeters = 0;
                myPlayer.displayScore = myPlayer.totalMeters;
            }

            targetMeters = currentStage * 20; WORLD_START_Y = targetMeters * 20;
            myPlayer.y = WORLD_START_Y; myPlayer.isAlive = true; myPlayer.hasFinished = false; myPlayer.deathReason = '';
            lastMoveTime = Date.now(); cameraY = WORLD_START_Y - 500;
            guardAnims = []; 
            UI.distText.innerText = 0;
            
            if (isHost) {
                if (bots.length === 0) initBots();
                bots.forEach(b => {
                    // ❗ 봇들도 1라운드 시작 시 점수 초기화
                    if (currentStage === 1) {
                        b.totalMeters = 0;
                        b.currentMeters = 0;
                        b.displayScore = 0;
                    } else {
                        b.totalMeters = (b.totalMeters || 0) + (b.currentMeters || 0);
                        b.currentMeters = 0;
                        b.displayScore = b.totalMeters;
                    }
                    b.y = WORLD_START_Y; b.displayY = WORLD_START_Y;
                    b.isAlive = true; b.hasFinished = false;
                    const speedMod = Math.max(0, (currentStage - 1) * 16);
                    const reactMod = Math.max(0, (currentStage - 1) * 12);
                    if(b.id === 'bot1') { b.stepSize=12; b.stepInterval=Math.max(45, 100-speedMod); b.reactionTime=Math.max(35, 120-reactMod); }
                    if(b.id === 'bot2') { b.stepSize=11; b.stepInterval=Math.max(65, 130-speedMod); b.reactionTime=Math.max(25, 80-reactMod); }
                    if(b.id === 'bot3') { b.stepSize=10; b.stepInterval=Math.max(85, 160-speedMod); b.reactionTime=Math.max(15, 50-reactMod); }
                });

                tagger.nextActionTime = Date.now() + 1000; tagger.state = 'SPEAKING';
                let speedMultiplier = Math.max(0.4, 1.0 - (currentStage - 1) * 0.08);
                tagger.currentPattern = BASE_PATTERNS[0].map(p => ({ t: p.t, d: p.d * speedMultiplier }));
                tagger.phraseIndex = 0;
            }
            syncLocalPlayer();
        }

        function movePlayer(foot) {
            if (gameState !== 'PLAYING' || !myPlayer.isAlive || myPlayer.hasFinished) return;
            lastMoveTime = Date.now(); 

            if (tagger.isLookingFront) { die('moved'); return; }

            if (myPlayer.lastFoot !== foot) {
                myPlayer.y -= myPlayer.stepSize; myPlayer.lastFoot = foot;
                
                myPlayer.currentMeters = Math.max(0, Math.floor((WORLD_START_Y - myPlayer.y) / 20));
                myPlayer.displayScore = myPlayer.totalMeters + myPlayer.currentMeters;
                UI.distText.innerText = myPlayer.currentMeters;

                if (myPlayer.y <= WORLD_FINISH_Y) { myPlayer.hasFinished = true; myPlayer.y = WORLD_FINISH_Y - 30; }
                syncLocalPlayer();
            }
        }

        function die(reason) {
            myPlayer.isAlive = false; myPlayer.deathReason = reason;
            myPlayer.currentMeters = Math.max(0, Math.floor((WORLD_START_Y - myPlayer.y) / 20));
            myPlayer.displayScore = myPlayer.totalMeters + myPlayer.currentMeters;

            if (reason === 'camp') { 
                guardAnims.push({ active: true, x: canvas.width + 100, y: myPlayer.y, targetX: myPlayer.x, alpha: 1 }); 
                myPlayer.x += 40; 
            }
            syncLocalPlayer();
        }

        const btnLeft = document.getElementById('btnLeft');
        const btnRight = document.getElementById('btnRight');
        const addInput = (el, foot) => {
            const handler = (e) => { e.preventDefault(); movePlayer(foot); el.classList.add('active'); setTimeout(()=>el.classList.remove('active'),100); };
            el.addEventListener('touchstart', handler, {passive: false}); el.addEventListener('mousedown', handler);
        };
        addInput(btnLeft, 'left'); addInput(btnRight, 'right');
        
        window.addEventListener('keydown', (e) => {
            if (gameState !== 'PLAYING' || !myPlayer.isAlive) return;
            if (e.key === 'ArrowLeft') { movePlayer('left'); btnLeft.classList.add('active'); setTimeout(()=> btnLeft.classList.remove('active'), 100); }
            if (e.key === 'ArrowRight') { movePlayer('right'); btnRight.classList.add('active'); setTimeout(()=> btnRight.classList.remove('active'), 100); }
        });

        function updateLogic() {
            const now = Date.now();

            if (gameState === 'PLAYING' && myPlayer.isAlive && !myPlayer.hasFinished) {
                if (now - lastMoveTime > 5000 && tagger.isLookingFront) die('camp'); 
            }

            if (isHost) {
                Object.keys(remotePlayers).forEach(uid => {
                    const rp = remotePlayers[uid];
                    // ❗ 버그 1번 수정: 나간 유저의 마지막 생존기록(lastActive)만 비교하여 삭제합니다 (8초 미응답시 삭제).
                    if (now - (rp.lastActive || 0) > 8000) {
                        deleteDoc(doc(getPlayersRef(), uid)).catch(e=>console.error("Cleanup error:", e));
                    }
                    else if (gameState === 'PLAYING' && rp.isAlive && !rp.hasFinished) {
                        if (tagger.isLookingFront && (now - rp.lastMoveTime > 5000)) {
                            setDoc(doc(getPlayersRef(), uid), { isAlive: false, deathReason: 'camp' }, { merge: true });
                        }
                    }
                });

                if (gameState === 'PLAYING') {
                    if (now > tagger.nextActionTime) {
                        if (tagger.state === 'SPEAKING') {
                            tagger.speechBubble = tagger.currentPattern.slice(0, tagger.phraseIndex + 1).map(p => p.t).join('');
                            let currentDelay = tagger.currentPattern[tagger.phraseIndex].d;
                            tagger.phraseIndex++;

                            if (tagger.phraseIndex >= tagger.currentPattern.length) {
                                tagger.state = 'LOOKING'; tagger.isLookingFront = true;
                                let minLook = Math.max(200, 700 - currentStage * 50);
                                tagger.nextActionTime = now + minLook + Math.random() * 600;
                            } else { tagger.nextActionTime = now + currentDelay; }
                        } else if (tagger.state === 'LOOKING') {
                            tagger.state = 'SPEAKING'; tagger.isLookingFront = false;
                            tagger.phraseIndex = 0; tagger.speechBubble = "";
                            
                            let maxPatternIndex = Math.min(BASE_PATTERNS.length, 2 + currentStage * 2);
                            let speedMultiplier = Math.max(0.4, 1.0 - (currentStage - 1) * 0.08);
                            let rawPattern = BASE_PATTERNS[Math.floor(Math.random() * maxPatternIndex)];
                            tagger.currentPattern = rawPattern.map(p => ({ t: p.t, d: p.d * speedMultiplier }));
                            tagger.nextActionTime = now + 400;
                        }
                    }

                    bots.forEach(bot => {
                        if (!bot.isAlive || bot.hasFinished) return;
                        let progress = tagger.phraseIndex / Math.max(1, tagger.currentPattern.length);
                        let startCautionProgress = tagger.currentPattern.length < 8 ? 0.3 : 0.45;
                        let currentDelay = 0; if (tagger.phraseIndex > 0) currentDelay = tagger.currentPattern[tagger.phraseIndex - 1].d;

                        if (!tagger.isLookingFront) {
                            if (now > bot.nextStepTime) {
                                let shouldStop = false;
                                if (tagger.state === 'SPEAKING' && progress > startCautionProgress) { if (Math.random() < bot.caution) shouldStop = true; }
                                if (shouldStop && currentDelay > 800) { if (Math.random() > bot.caution + 0.1) shouldStop = false; }

                                if (shouldStop) { bot.nextStepTime = now + 100; } 
                                else {
                                    bot.y -= bot.stepSize; bot.lastFoot = bot.lastFoot === 'left' ? 'right' : 'left';
                                    bot.currentMeters = Math.max(0, Math.floor((WORLD_START_Y - bot.y) / 20));
                                    bot.displayScore = bot.totalMeters + bot.currentMeters;

                                    bot.nextStepTime = now + bot.stepInterval + (Math.random() * 40 - 20); bot.lastMoveTime = now;
                                    if (bot.y <= WORLD_FINISH_Y) bot.hasFinished = true;
                                }
                            }
                        } else { if (now - bot.lastMoveTime < 100) bot.isAlive = false; }
                    });
                }
            }

            let slotIndex = 1;
            const keys = Object.keys(remotePlayers);
            const slotWidth = canvas.width / (keys.length + bots.length + 2);
            bots.forEach(b => { b.x = slotWidth * slotIndex++; });
            myPlayer.x = slotWidth * slotIndex++;
            keys.forEach(k => { remotePlayers[k].x = slotWidth * slotIndex++; });
        }

        function drawTagger(t) {
            ctx.fillStyle = '#ec4899'; ctx.beginPath(); ctx.arc(0, 20, 20, Math.PI, 0); ctx.fill(); 
            ctx.beginPath(); ctx.arc(0, 0, t.radius, 0, Math.PI * 2);
            if (t.isLookingFront) {
                ctx.fillStyle = '#fcd34d'; ctx.fill(); 
                ctx.fillStyle = 'black'; ctx.fillRect(-12, -8, 6, 6); ctx.fillRect(6, -8, 6, 6); 
                ctx.fillStyle = 'red'; ctx.beginPath(); ctx.arc(0, 10, 6, 0, Math.PI * 2); ctx.fill(); 
                ctx.fillStyle = 'rgba(239, 68, 68, 0.3)'; ctx.beginPath(); ctx.moveTo(0, t.radius); ctx.lineTo(-1000, 2000); ctx.lineTo(1000, 2000); ctx.fill();
            } else { ctx.fillStyle = '#111827'; ctx.fill(); }
        }

        function drawCharacter(char, maxScore) {
            ctx.save();
            if (char.displayY === undefined) char.displayY = char.y;
            char.displayY += (char.y - char.displayY) * 0.3;
            
            ctx.translate(char.x, char.displayY);
            if (!char.isAlive) ctx.globalAlpha = 0.4;
            ctx.fillStyle = char.color; ctx.fillRect(-15, 0, 30, 20);
            ctx.beginPath(); ctx.arc(0, -10, char.radius, 0, Math.PI * 2); ctx.fill();

            ctx.fillStyle = '#111';
            if (char.lastFoot === 'left') { ctx.fillRect(-15, 20, 12, 12); ctx.fillRect(3, 10, 12, 12); } 
            else { ctx.fillRect(-15, 10, 12, 12); ctx.fillRect(3, 20, 12, 12); }

            if (!char.isAlive) {
                ctx.strokeStyle = 'red'; ctx.lineWidth = 6;
                ctx.beginPath(); ctx.moveTo(-20, -30); ctx.lineTo(20, 10); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(20, -30); ctx.lineTo(-20, 10); ctx.stroke();
            }
            
            ctx.fillStyle = 'white'; ctx.font = 'bold 12px sans-serif'; ctx.textAlign = 'center';
            let textY = -35;
            
            ctx.fillText(`${char.displayScore || 0}m`, 0, textY);
            textY -= 15;
            ctx.fillText(char.name, 0, textY);
            textY -= 15;

            if (char.displayScore === maxScore && maxScore > 0) {
                ctx.font = '16px sans-serif';
                ctx.fillText('👑', 0, textY);
                textY -= 18;
            }

            if (char === myPlayer) {
                ctx.fillStyle = '#fcd34d'; 
                ctx.font = 'bold 14px sans-serif';
                ctx.fillText('나👇', 0, textY);
            }

            ctx.restore();
        }

        function draw() {
            // 카메라 목표 위치 계산
            let targetCameraY = cameraY;
            
            if (myPlayer.isAlive && !myPlayer.hasFinished) {
                // 내가 살아있을 때는 나를 따라감
                targetCameraY = myPlayer.y - canvas.height * 0.7;
            } else {
                // 내가 죽거나 통과했을 때: 남은 생존자 중 가장 앞서있는(y가 가장 작은) 사람을 관전
                let bestY = Infinity;
                [...bots, ...Object.values(remotePlayers)].forEach(c => {
                    if (c.isAlive && !c.hasFinished && c.y < bestY) {
                        bestY = c.y;
                    }
                });
                if (bestY !== Infinity) {
                    targetCameraY = bestY - canvas.height * 0.7;
                }
            }
            
            // 카메라 부드러운 이동 적용
            cameraY += (targetCameraY - cameraY) * 0.1;
            if (cameraY < -150) cameraY = -150;

            ctx.clearRect(0, 0, canvas.width, canvas.height); ctx.save(); ctx.translate(0, -cameraY);

            ctx.strokeStyle = 'rgba(0,0,0,0.1)'; ctx.lineWidth = 2;
            for (let i = 0; i <= WORLD_START_Y; i += 100) { ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke(); }
            ctx.fillStyle = '#fca5a5'; ctx.fillRect(0, WORLD_FINISH_Y, canvas.width, 20);
            ctx.fillStyle = 'white'; ctx.fillRect(0, WORLD_START_Y + 20, canvas.width, 10);

            ctx.save(); ctx.translate(tagger.x, tagger.y); drawTagger(tagger); ctx.restore();

            let allChars = [...bots, ...Object.values(remotePlayers), myPlayer].sort((a, b) => a.y - b.y);
            
            let maxScore = -1;
            allChars.forEach(c => { if ((c.displayScore || 0) > maxScore) maxScore = (c.displayScore || 0); });

            allChars.forEach(c => drawCharacter(c, maxScore));

            guardAnims.forEach(anim => {
                if (anim.active) {
                    anim.x += (anim.targetX - anim.x) * 0.3;
                    ctx.save(); ctx.translate(anim.x, anim.y);
                    ctx.fillStyle = '#ec4899'; ctx.fillRect(-20, -20, 40, 40);
                    ctx.fillStyle = 'white'; ctx.font = 'bold 20px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline='middle'; ctx.fillText('■', 0, 0);
                    ctx.fillStyle = 'red'; ctx.font = 'bold 24px sans-serif'; ctx.fillText('캠핑 금지!', 0, -40); ctx.restore();
                    if (Math.abs(anim.x - anim.targetX) < 5) { anim.alpha -= 0.05; if (anim.alpha <= 0) anim.active = false; }
                }
            });
            guardAnims = guardAnims.filter(a => a.active); 

            ctx.restore();

            if (!tagger.isLookingFront && tagger.speechBubble) {
                ctx.save();
                let fontSize = Math.min(36, (canvas.width * 0.8) / (tagger.speechBubble.length || 1));
                ctx.font = `900 ${fontSize}px sans-serif`; const textWidth = ctx.measureText(tagger.speechBubble).width;
                ctx.fillStyle = 'white'; ctx.strokeStyle = '#ec4899'; ctx.lineWidth = 4;
                ctx.beginPath(); ctx.roundRect(canvas.width/2 - textWidth/2 - 20, 80, textWidth + 40, fontSize * 1.5, 20); ctx.fill(); ctx.stroke();
                ctx.fillStyle = 'black'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText(tagger.speechBubble, canvas.width/2, 80 + fontSize*0.75); ctx.restore();
            } else if (tagger.isLookingFront) {
                ctx.save(); ctx.fillStyle = '#ef4444'; ctx.strokeStyle = 'white'; ctx.lineWidth = 6;
                ctx.font = '900 48px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.strokeText('👀 멈춰!', canvas.width / 2, 110); ctx.fillText('👀 멈춰!', canvas.width / 2, 110); ctx.restore();
            }
        }

        function gameLoop() { updateLogic(); draw(); requestAnimationFrame(gameLoop); }

    </script>
</body>
